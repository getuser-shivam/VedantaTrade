  # Alerting
  alerting:
    name: Alerting
    runs-on: ubuntu-latest
    needs: [health-monitoring, performance-monitoring, security-monitoring, uptime-monitoring]
    if: always()
    
    steps:
    - name: Download All Reports
      uses: actions/download-artifact@v3

    - name: Analyze Results and Send Alerts
      run: |
        echo "Analyzing monitoring results and sending alerts..."
        
        # Check if any critical issues need alerts
        health_status="${{ needs.health-monitoring.result }}"
        performance_status="${{ needs.performance-monitoring.result }}"
        security_status="${{ needs.security-monitoring.result }}"
        uptime_status="${{ needs.uptime-monitoring.result }}"
        
        # Send alerts based on results
        if [[ "$health_status" == "failure" || "$performance_status" == "failure" || "$security_status" == "failure" || "$uptime_status" == "failure" ]]; then
          echo "🚨 Critical issues detected - Sending alerts..."
          
          # Send Slack alert
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"🚨 VedantaTrade Monitoring Alert - Critical issues detected in ${{ github.event.inputs.environment }} environment"}' \
            ${{ secrets.SLACK_WEBHOOK_URL }}
            
          # Send email alert
