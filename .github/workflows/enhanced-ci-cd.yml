name: Enhanced CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production
        - test
      run_tests:
        description: 'Run full test suite'
        required: false
        default: true
        type: boolean
      skip_build:
        description: 'Skip build step (testing only)'
        required: false
        default: false
        type: boolean

env:
  FLUTTER_VERSION: '3.19.0'
  NODE_VERSION: '20.x'
  JAVA_VERSION: '17'
  RUBY_VERSION: '3.0'

permissions:
  contents: read
  packages: write
  pull-requests: write
  checks: write
  statuses: write

jobs:
  # Code Quality & Analysis
  code-quality:
    name: Code Quality & Analysis
    runs-on: ubuntu-latest
    outputs:
      quality-passed: ${{ steps.quality.outputs.passed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter analyze
        id: analyze
        run: |
          flutter analyze --fatal-infos --preamble > flutter-analysis.txt
          ANALYSIS_EXIT_CODE=$?
          echo "exit_code=$ANALYSIS_EXIT_CODE" >> $GITHUB_OUTPUT
          cat flutter-analysis.txt

      - name: Check code formatting
        id: format
        run: |
          dart format --output=none --set-exit-if-changed lib test
          FORMAT_EXIT_CODE=$?
          echo "exit_code=$FORMAT_EXIT_CODE" >> $GITHUB_OUTPUT
          if [ $FORMAT_EXIT_CODE -eq 0 ]; then
            echo "✅ Code is properly formatted"
          else
            echo "❌ Code formatting issues found"
            dart format lib test
          fi

      - name: Run dart fix
        run: dart fix --apply

      - name: Quality Gate
        id: quality
        run: |
          if [ ${{ steps.analyze.outputs.exit_code }} -eq 0 ] && [ ${{ steps.format.outputs.exit_code }} -eq 0 ]; then
            echo "passed=true" >> $GITHUB_OUTPUT
            echo "✅ Quality gate passed"
          else
            echo "passed=false" >> $GITHUB_OUTPUT
            echo "❌ Quality gate failed"
            exit 1
          fi

      - name: Upload analysis results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-results
          path: |
            flutter-analysis.txt
            lib/
            test/

  # Security Scanning
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/

      - name: Run npm audit
        working-directory: backend
        run: npm audit --audit-level=moderate --json > audit-results.json || true

      - name: Run Flutter security check
        run: |
          flutter pub deps --json > flutter-deps.json
          # Check for known vulnerable packages
          echo "Checking Flutter dependencies for security issues..."

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          languages: javascript
          queries: security-extended

      - name: Upload security results
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: |
            backend/audit-results.json
            flutter-deps.json

  # Automated Testing
  automated-tests:
    name: Automated Testing
    runs-on: ubuntu-latest
    needs: code-quality
    if: needs.code-quality.outputs.quality-passed == 'true' && github.event.inputs.run_tests != 'false'
    strategy:
      matrix:
        test-type: [unit, widget, integration]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run ${{ matrix.test-type }} tests
        run: |
          case "${{ matrix.test-type }}" in
            "unit")
              flutter test --coverage --reporter=expanded
              ;;
            "widget")
              flutter test test/widget_test.dart --coverage --reporter=expanded
              ;;
            "integration")
              flutter test integration_test/ --coverage --reporter=expanded || echo "Integration tests not yet implemented"
              ;;
          esac

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.test-type }}
          path: coverage/lcov.info

  # Build Verification
  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [code-quality, automated-tests]
    if: github.event.inputs.skip_build != 'true'
    strategy:
      matrix:
        platform: [android, web, ios]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java (for Android/iOS)
        if: matrix.platform == 'android' || matrix.platform == 'ios'
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build ${{ matrix.platform }}
        run: |
          case "${{ matrix.platform }}" in
            "android")
              flutter build apk --debug
              flutter build appbundle --debug
              ;;
            "web")
              flutter build web --release
              ;;
            "ios")
              flutter build ios --release --no-codesign
              ;;
          esac

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: |
            build/app/outputs/
            build/web/
            build/ios/

  # Performance Testing
  performance-tests:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: build-verification
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run performance tests
        run: |
          echo "Running performance tests..."
          # Add performance test commands here
          flutter test test/performance/ || echo "Performance tests not yet implemented"

      - name: Memory profiling
        run: |
          echo "Running memory profiling..."
          # Add memory profiling commands here

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: performance/

  # Staging Deployment
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [code-quality, automated-tests, build-verification]
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build for staging
        run: |
          flutter build web --release
          echo "Building for staging environment..."

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add staging deployment commands here
          # Example: AWS S3, Vercel, Netlify, etc.

      - name: Run smoke tests
        run: |
          echo "Running smoke tests on staging..."
          # Add smoke test commands here

      - name: Health check
        run: |
          echo "Performing health check..."
          # Add health check commands here

  # Production Deployment
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging, performance-tests]
    if: github.ref == 'refs/heads/main' && github.event.inputs.environment == 'production'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/

      - name: Install dependencies
        run: |
          flutter pub get
          cd backend && npm ci

      - name: Build for production
        run: |
          flutter build web --release
          cd backend && npm run build

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # Add production deployment commands here

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
            build/web/
          generate_release_notes: true

      - name: Run production tests
        run: |
          echo "Running production tests..."
          # Add production test commands here

      - name: Final health check
        run: |
          echo "Performing final health check..."
          # Add final health check commands here

  # Mobile App Store Deployment
  deploy-mobile-stores:
    name: Deploy to Mobile Stores
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.event.inputs.environment == 'production'
    strategy:
      matrix:
        store: [play-store, app-store]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Java (for Android)
        if: matrix.store == 'play-store'
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: flutter pub get

      - name: Build for ${{ matrix.store }}
        run: |
          if [ "${{ matrix.store }}" = "play-store" ]; then
            flutter build appbundle --release
          elif [ "${{ matrix.store }}" = "app-store" ]; then
            flutter build ios --release --no-codesign
          fi

      - name: Deploy to ${{ matrix.store }}
        run: |
          echo "Deploying to ${{ matrix.store }}..."
          # Add store deployment commands here

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.store }}-build
          path: |
            build/app/outputs/bundle/
            build/ios/

  # Notification & Reporting
  notify-results:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production, deploy-mobile-stores]
    if: always()
    steps:
      - name: Get workflow status
        id: status
        run: |
          if [[ "${{ needs.deploy-staging.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Notify Slack
        run: |
          if [ "${{ steps.status.outputs.status }}" = "success" ]; then
            curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"✅ CI/CD pipeline completed successfully for ${{ github.repository }} - ${{ github.sha }}"}' \
            ${{ secrets.SLACK_WEBHOOK_URL }} || echo "Slack notification skipped"
          else
            curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"❌ CI/CD pipeline failed for ${{ github.repository }} - ${{ github.sha }}"}' \
            ${{ secrets.SLACK_WEBHOOK_URL }} || echo "Slack notification skipped"
          fi

      - name: Update deployment status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: '${{ steps.status.outputs.status }}' === 'success' ? 'success' : 'failure',
              target_url: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}',
              description: 'CI/CD pipeline ${{ steps.status.outputs.status }}',
              context: 'ci/cd'
            })

  # Cleanup
  cleanup:
    name: Cleanup Resources
    runs-on: ubuntu-latest
    needs: [notify-results]
    if: always()
    steps:
      - name: Cleanup temporary resources
        run: |
          echo "Cleaning up temporary resources..."
          # Add cleanup commands here

      - name: Archive logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-cd-logs
          path: |
            **/*.log
            **/logs/
