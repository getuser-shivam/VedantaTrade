name: CI/CD Pipeline for VedantaTrade

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # Code Quality and Analysis
  code-quality:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.2'
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Analyze code
      run: flutter analyze --no-fatal-infos
      
    - name: Check code formatting
      run: dart format --set-exit-if-changed .
      
    - name: Run tests
      run: flutter test --coverage
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: coverage/lcov.info
        fail_ci_if_error: false

  # Security Scanning
  security-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  # Build and Test for Multiple Platforms
  build-test:
    needs: [code-quality, security-scan]
    strategy:
      matrix:
        platform: [web, android, ios]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.2'
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Build for ${{ matrix.platform }}
      run: |
        if [ "${{ matrix.platform }}" = "web" ]; then
          flutter build web --web-renderer canvaskit --no-tree-shake-icons
        elif [ "${{ matrix.platform }}" = "android" ]; then
          flutter build apk --release
        elif [ "${{ matrix.platform }}" = "ios" ]; then
          flutter build ios --release --no-codesign
        fi
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: vedantatrade-${{ matrix.platform }}
        path: |
          build/web/
          build/app/outputs/flutter-apk/app-release.apk
          build/ios/build/Products/Release-iphoneos/
        retention-days: 30

  # Integration Tests
  integration-tests:
    needs: [code-quality]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.2'
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Start integration test server
      run: |
        flutter test integration_test/ --start-paused &
        sleep 30
        
    - name: Run integration tests
      run: flutter test integration_test/ --device-id=web-server

  # Performance Testing
  performance-test:
    needs: [build-test]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Download web build
      uses: actions/download-artifact@v3
      with:
        name: vedantatrade-web
        path: build/
        
    - name: Run Lighthouse CI
      run: |
        npm install -g @lhci/cli@0.12.x
        lhci autorun
      env:
        LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # Deploy to Staging (for PRs)
  deploy-staging:
    if: github.event_name == 'pull_request'
    needs: [build-test, integration-tests]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Download web build
      uses: actions/download-artifact@v3
      with:
        name: vedantatrade-web
        path: build/web/
        
    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment..."
        # Add your staging deployment logic here
        # Example: Deploy to Netlify, Vercel, or AWS S3

  # Deploy to Production (for main branch)
  deploy-production:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build-test, integration-tests, performance-test]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Download web build
      uses: actions/download-artifact@v3
      with:
        name: vedantatrade-web
        path: build/web/
        
    - name: Fix GitHub Pages routing
      run: |
        cp build/web/index.html build/web/404.html
        
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: build/web
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      
    - name: Deploy to App Stores
      run: |
        echo "Deploying to app stores..."
        # Add your app store deployment logic here
        # Example: Fastlane for iOS/Android deployment

  # Notification and Reporting
  notify:
    needs: [deploy-production]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Notify deployment status
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        
    - name: Create release
      if: success()
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
