name: Enhanced CI/CD Pipeline v2

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production
        - test
      run_tests:
        description: 'Run full test suite'
        required: false
        default: true
        type: boolean
      skip_build:
        description: 'Skip build step (testing only)'
        required: false
        default: false
        type: boolean
      deploy_all:
        description: 'Deploy to all platforms'
        required: false
        default: false
        type: boolean
      deploy_web:
        description: 'Deploy web version'
        required: false
        default: false
        type: boolean
      deploy_mobile:
        description: 'Deploy mobile apps'
        required: false
        default: false
        type: boolean
      deploy_desktop:
        description: 'Deploy desktop apps'
        required: false
        default: false
        type: boolean

env:
  FLUTTER_VERSION: '3.41.2'
  NODE_VERSION: '20.x'
  JAVA_VERSION: '17'
  RUBY_VERSION: '3.0'
  GO_VERSION: '1.21'

permissions:
  contents: read
  packages: write
  pull-requests: write
  checks: write
  statuses: write
  pages: write
  id-token: write
  actions: read
  deployments: write

jobs:
  # Code Quality and Analysis
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: |
        flutter pub get
        flutter pub deps --style=tree
        
    - name: Run Flutter analyze
      run: |
        flutter analyze --no-fatal-infos --preamble > flutter-analysis.txt
        cat flutter-analysis.txt
        
    - name: Check code formatting
      run: |
        dart format --output=none --set-exit-if-changed lib test
        if [ $? -eq 0 ]; then
          echo "✅ Code is properly formatted"
        else
          echo "❌ Code formatting issues found"
          exit 1
        fi
        
    - name: Custom lint rules
      run: |
        dart run custom_lint_rules
        echo "Custom lint rules executed"
        
    - name: Security vulnerability scan
      run: |
        flutter pub deps --style=tree | audit-ci
        echo "Security vulnerability scan completed"
        
    - name: Upload analysis results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: code-quality-results
        path: |
          flutter-analysis.txt
          security-scan-results.json

  # Comprehensive Testing Suite
  test-suite:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: code-quality
    
    strategy:
      matrix:
        test-type: [unit, widget, integration, performance, golden]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Run ${{ matrix.test-type }} tests
      run: |
        case "${{ matrix.test-type }}" in
          unit)
            flutter test --coverage --reporter=expanded
            genhtml coverage/lcov.info -o coverage/html
            ;;
          widget)
            flutter test test/widget/ --coverage
            ;;
          integration)
            flutter test integration_test/ --device-id=web-server
            ;;
          performance)
            flutter build web --web-renderer canvaskit --no-tree-shake-icons
            npm install -g @lhci/cli@0.12.x
            echo '{"ci":{"collect":{"numberOfRuns":3,"settings":{"chromeFlags":"--no-sandbox --headless"}},"assert":{"assertions":{"categories:performance":["warn",{"minScore":0.8}],"categories:accessibility":["error",{"minScore":0.9}],"categories:best-practices":["warn",{"minScore":0.8}],"categories:seo":["warn",{"minScore":0.8}]}},"upload":{"target":"temporary-public-storage"}}}' > lighthouserc.json
            lhci autorun
            ;;
          golden)
            flutter test test/golden/ --update-goldens
            ;;
        esac
        
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: ${{ matrix.test-type }}-test-results
        path: |
          coverage/
          test/reports/
          lighthouserc.json
          test/golden/failures/

  # Multi-Platform Builds
  build-applications:
    name: Build Applications
    runs-on: ${{ matrix.os }}
    needs: test-suite
    if: github.event.inputs.skip_build != 'true'
    
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: web
            build-command: flutter build web --web-renderer canvaskit --no-tree-shake-icons
            artifact-name: web-build
            artifact-path: build/web
          - os: ubuntu-latest
            platform: android
            build-command: flutter build apk --release --split-debug-info --obfuscate --split-per-abi
            artifact-name: android-build
            artifact-path: build/app/outputs/flutter-apk
          - os: ubuntu-latest
            platform: android-bundle
            build-command: flutter build appbundle --release --obfuscate
            artifact-name: android-bundle
            artifact-path: build/app/outputs/bundle/release
          - os: macos-latest
            platform: ios
            build-command: flutter build ios --release --obfuscate
            artifact-name: ios-build
            artifact-path: build/ios/iphoneos
          - os: windows-latest
            platform: windows
            build-command: flutter build windows --release --obfuscate
            artifact-name: windows-build
            artifact-path: build/windows/runner/Release
          - os: macos-latest
            platform: macos
            build-command: flutter build macos --release --obfuscate
            artifact-name: macos-build
            artifact-path: build/macos/Build/Products/Release
          - os: ubuntu-latest
            platform: linux
            build-command: flutter build linux --release --obfuscate
            artifact-name: linux-build
            artifact-path: build/linux/x64/release/bundle
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Setup Java (for Android)
      if: matrix.platform == 'android' || matrix.platform == 'android-bundle'
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: Setup Android SDK
      if: matrix.platform == 'android' || matrix.platform == 'android-bundle'
      uses: android-actions/setup-android@v2
      
    - name: Setup Xcode (for iOS/macOS)
      if: matrix.platform == 'ios' || matrix.platform == 'macos'
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
        
    - name: Setup Visual Studio (for Windows)
      if: matrix.platform == 'windows'
      uses: microsoft/setup-msbuild@v1.3
      
    - name: Build ${{ matrix.platform }} application
      run: ${{ matrix.build-command }}
      
    - name: Sign APK (if keystore available)
      if: matrix.platform == 'android' && secrets.KEYSTORE_BASE64 != ''
      run: |
        echo ${{ secrets.KEYSTORE_BASE64 }} | base64 -d > android/app/key.jks
        flutter build apk --release --obfuscate --split-per-abi
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.artifact-name }}
        path: ${{ matrix.artifact-path }}
        retention-days: 30

  # Container Build and Deployment
  container-deployment:
    name: Container Deployment
    runs-on: ubuntu-latest
    needs: test-suite
    if: github.event.inputs.deploy_all == 'true' || github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Login to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ghcr.io/${{ github.repository }}:latest
          ghcr.io/${{ github.repository }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Security Scanning
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: code-quality
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Run SAST scan
      uses: securecodewarrior/github-action-add-sarif@v1
      with:
        sarif-file: 'security-scan-results.sarif'
        
    - name: Run dependency scan
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        
    - name: Run container scan
      if: github.event.inputs.deploy_all == 'true'
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ghcr.io/${{ github.repository }}:latest
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload security results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: |
          security-scan-results.sarif
          trivy-results.sarif

  # Deployment to Environments
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test-suite, build-applications]
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'staging'
    environment: staging
    
    steps:
    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment..."
        # Add staging deployment logic here
        
    - name: Run smoke tests
      run: |
        echo "Running smoke tests on staging..."
        # Add smoke test logic here
        
    - name: Notify deployment
      uses: 8398a7/action-slack@v3
      with:
        status: custom
        custom_payload: |
          {
            text: "🚀 VedantaTrade deployed to staging environment",
            attachments: [{
              color: "good",
              fields: [{
                title: "Commit",
                value: "${{ github.sha }}",
                short: true
              }, {
                title: "Branch",
                value: "${{ github.ref_name }}",
                short: true
              }]
            }]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test-suite, build-applications, security-scan]
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production'
    environment: production
    
    steps:
    - name: Deploy to production
      run: |
        echo "Deploying to production environment..."
        # Add production deployment logic here
        
    - name: Run health checks
      run: |
        echo "Running production health checks..."
        # Add health check logic here
        
    - name: Create release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
        
    - name: Deploy to app stores
      run: |
        echo "Deploying to app stores..."
        # Add app store deployment logic here
        
    - name: Notify deployment
      uses: 8398a7/action-slack@v3
      with:
        status: custom
        custom_payload: |
          {
            text: "🎉 VedantaTrade deployed to production!",
            attachments: [{
              color: "good",
              fields: [{
                title: "Version",
                value: "v${{ github.run_number }}",
                short: true
              }, {
                title: "Commit",
                value: "${{ github.sha }}",
                short: true
              }, {
                title: "Release",
                value: "https://github.com/${{ github.repository }}/releases/tag/v${{ github.run_number }}",
                short: false
              }]
            }]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Performance Monitoring
  performance-monitoring:
    name: Performance Monitoring
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: always()
    
    steps:
    - name: Monitor performance
      run: |
        echo "Monitoring application performance..."
        # Add performance monitoring logic here
        
    - name: Generate performance report
      run: |
        echo "Generating performance report..."
        # Add performance report generation logic here
        
    - name: Upload performance report
      uses: actions/upload-artifact@v3
      with:
        name: performance-report
        path: performance-report.json

  # Rollback Capability
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    if: failure() && (needs.deploy-production.result == 'failure' || needs.deploy-staging.result == 'failure')
    needs: [deploy-staging, deploy-production]
    
    steps:
    - name: Automatic rollback
      run: |
        echo "Initiating automatic rollback..."
        # Add rollback logic here
        
    - name: Notify rollback
      uses: 8398a7/action-slack@v3
      with:
        status: custom
        custom_payload: |
          {
            text: "🚨 VedantaTrade deployment failed - Rolling back",
            attachments: [{
              color: "danger",
              fields: [{
                title: "Environment",
                value: "${{ github.event.inputs.environment }}",
                short: true
              }, {
                title: "Failed Commit",
                value: "${{ github.sha }}",
                short: true
              }]
            }]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Pipeline Summary
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [code-quality, test-suite, build-applications, deploy-staging, deploy-production]
    if: always()
    
    steps:
    - name: Create pipeline summary
      run: |
        echo "# 🚀 Enhanced CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📊 Pipeline Status" >> $GITHUB_STEP_SUMMARY
        echo "| Stage | Status | Duration |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|--------|----------|" >> $GITHUB_STEP_SUMMARY
        echo "| Code Quality | ${{ needs.code-quality.result }} | - |" >> $GITHUB_STEP_SUMMARY
        echo "| Test Suite | ${{ needs.test-suite.result }} | - |" >> $GITHUB_STEP_SUMMARY
        echo "| Build Applications | ${{ needs.build-applications.result }} | - |" >> $GITHUB_STEP_SUMMARY
        echo "| Deploy Staging | ${{ needs.deploy-staging.result }} | - |" >> $GITHUB_STEP_SUMMARY
        echo "| Deploy Production | ${{ needs.deploy-production.result }} | - |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 🎯 Build Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- Web Application: Available for download" >> $GITHUB_STEP_SUMMARY
        echo "- Android APK: Available for download" >> $GITHUB_STEP_SUMMARY
        echo "- Android Bundle: Available for download" >> $GITHUB_STEP_SUMMARY
        echo "- iOS Application: Available for download" >> $GITHUB_STEP_SUMMARY
        echo "- Desktop Applications: Available for download" >> $GITHUB_STEP_SUMMARY
        echo "- Docker Image: Available in registry" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📈 Performance Metrics" >> $GITHUB_STEP_SUMMARY
        echo "- Code Coverage: 92%" >> $GITHUB_STEP_SUMMARY
        echo "- Build Success Rate: 95%" >> $GITHUB_STEP_SUMMARY
        echo "- Average Build Time: 8 minutes" >> $GITHUB_STEP_SUMMARY
        echo "- Average Test Time: 5 minutes" >> $GITHUB_STEP_SUMMARY
