name: vedanta_trade
description: VedantaTrade - Enterprise Pharma Trade Management Platform by Vedanta TradeLink

publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # UI
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  lottie: ^3.1.0
  shimmer: ^3.0.0
  badges: ^3.1.2
  fl_chart: ^0.67.0
  percent_indicator: ^4.2.3

  # Navigation
  go_router: ^12.1.3

  # State management
  provider: ^6.1.1

  # HTTP & Storage
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Date/Time
  intl: ^0.19.0
  table_calendar: ^3.0.9

  # Forms & Input
  image_picker: ^1.0.7

  # Misc
  uuid: ^4.3.3
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
