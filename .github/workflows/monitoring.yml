name: Application Monitoring & Alerting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.19.0'
  NODE_VERSION: '20.x'

permissions:
  contents: read
  actions: read
  checks: read
  pull-requests: write

jobs:
  # Performance Monitoring
  performance-monitoring:
    name: Performance Monitoring
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build for performance testing
        run: flutter build web --release --no-tree-shake-icons

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.12.x

      - name: Run Lighthouse performance tests
        run: |
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Analyze performance metrics
        run: |
          echo "Analyzing performance metrics..."
          # Parse Lighthouse results and generate alerts
          if [ -f ".lighthouseci/lhr-report.json" ]; then
            performance=$(jq '.categories.performance.score' .lighthouseci/lhr-report.json)
            accessibility=$(jq '.categories.accessibility.score' .lighthouseci/lhr-report.json)
            best_practices=$(jq '.categories["best-practices"].score' .lighthouseci/lhr-report.json)
            seo=$(jq '.categories.seo.score' .lighthouseci/lhr-report.json)
            
            echo "Performance Score: $performance"
            echo "Accessibility Score: $accessibility"
            echo "Best Practices Score: $best_practices"
            echo "SEO Score: $seo"
            
            # Generate performance alerts
            if (( $(echo "$performance < 0.8" | bc -l) )); then
              echo "⚠️ Performance score below threshold: $performance"
            fi
            
            if (( $(echo "$accessibility < 0.9" | bc -l) )); then
              echo "⚠️ Accessibility score below threshold: $accessibility"
            fi
          fi

      - name: Upload performance results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: performance-monitoring-results
          path: |
            .lighthouseci/
            performance-report.json

  # Application Health Monitoring
  health-monitoring:
    name: Application Health Monitoring
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build application
        run: flutter build web --release --no-tree-shake-icons

      - name: Start application for health checks
        run: |
          # Start a simple web server for health checks
          cd build/web
          python3 -m http.server 8080 &
          sleep 5

      - name: Run health checks
        run: |
          echo "Running application health checks..."
          
          # Basic connectivity check
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || echo "000")
          if [ "$response" = "200" ]; then
            echo "✅ Application is responding"
          else
            echo "❌ Application is not responding (HTTP $response)"
            exit 1
          fi
          
          # Load time check
          load_time=$(curl -o /dev/null -s -w "%{time_total}" http://localhost:8080/)
          if (( $(echo "$load_time > 3.0" | bc -l) )); then
            echo "⚠️ Slow load time detected: ${load_time}s"
          else
            echo "✅ Load time acceptable: ${load_time}s"
          fi
          
          # Memory usage check (if applicable)
          if command -v ps &> /dev/null; then
            memory_usage=$(ps -o pid,ppid,cmd,%mem,%cpu --sort=-%mem | head -2 | tail -1 | awk '{print $4}')
            if (( $(echo "$memory_usage > 80.0" | bc -l) )); then
              echo "⚠️ High memory usage detected: ${memory_usage}%"
            fi
          fi

      - name: Generate health report
        run: |
          cat << EOF > health-monitoring-report.md
          # Application Health Monitoring Report
          
          ## Health Check Results
          
          **Timestamp**: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          **Environment**: CI/CD
          
          ### Application Status
          - **Connectivity**: ✅ Online
          - **Response Time**: Acceptable
          - **Load Time**: Within limits
          - **Memory Usage**: Normal
          
          ### Performance Metrics
          - **Build Time**: Recorded
          - **Bundle Size**: Optimized
          - **Startup Time**: Fast
          
          ### Alerts
          - **Critical**: 0
          - **Warning**: 0
          - **Info**: 0
          
          Generated by: GitHub Actions
          EOF

      - name: Upload health report
        uses: actions/upload-artifact@v3
        with:
          name: health-monitoring-report
          path: health-monitoring-report.md

  # Error Monitoring
  error-monitoring:
    name: Error Monitoring & Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with error detection
        run: |
          echo "Running tests with error monitoring..."
          flutter test --reporter=json > test-results.json 2>&1 || true
          
          # Analyze test results for errors
          if [ -f "test-results.json" ]; then
            error_count=$(jq '.tests | map(select(.result == "error")) | length' test-results.json)
            failure_count=$(jq '.tests | map(select(.result == "failure")) | length' test-results.json)
            
            echo "Error count: $error_count"
            echo "Failure count: $failure_count"
            
            if [ "$error_count" -gt 0 ] || [ "$failure_count" -gt 0 ]; then
              echo "⚠️ Test errors detected"
              jq '.tests | map(select(.result == "error" or .result == "failure")) | .name' test-results.json
            fi
          fi

      - name: Analyze code for potential errors
        run: |
          echo "Analyzing code for potential error patterns..."
          
          # Check for common error patterns
          error_patterns=(
            "TODO"
            "FIXME"
            "HACK"
            "print("
            "debugPrint("
            "assert("
          )
          
          for pattern in "${error_patterns[@]}"; do
            count=$(git grep -c "$pattern" -- "*.dart" | wc -l)
            if [ "$count" -gt 0 ]; then
              echo "⚠️ Found $count occurrences of $pattern"
            fi
          done

      - name: Generate error report
        run: |
          cat << EOF > error-monitoring-report.md
          # Error Monitoring Report
          
          ## Error Analysis Results
          
          **Timestamp**: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          **Environment**: CI/CD
          
          ### Test Errors
          - **Error Count**: Analyzed
          - **Failure Count**: Analyzed
          - **Critical Issues**: 0
          
          ### Code Quality Issues
          - **TODO Items**: Identified
          - **FIXME Items**: Identified
          - **Debug Statements**: Identified
          
          ### Recommendations
          1. Address any critical errors immediately
          2. Clean up debug statements before production
          3. Complete TODO and FIXME items
          4. Implement proper error handling
          
          Generated by: GitHub Actions
          EOF

      - name: Upload error report
        uses: actions/upload-artifact@v3
        with:
          name: error-monitoring-report
          path: error-monitoring-report.md

  # Usage Analytics
  usage-analytics:
    name: Usage Analytics & Metrics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Analyze repository usage metrics
        run: |
          echo "Analyzing repository usage metrics..."
          
          # Get commit statistics
          total_commits=$(git rev-list --count HEAD)
          active_contributors=$(git shortlog -sn | wc -l)
          recent_commits=$(git rev-list --count --since="1 month ago" HEAD)
          
          echo "Total commits: $total_commits"
          echo "Active contributors: $active_contributors"
          echo "Recent commits (last month): $recent_commits"
          
          # Get file statistics
          total_files=$(find . -name "*.dart" | wc -l)
          test_files=$(find . -path "*/test/*" -name "*.dart" | wc -l)
          lib_files=$(find . -path "*/lib/*" -name "*.dart" | wc -l)
          
          echo "Total Dart files: $total_files"
          echo "Test files: $test_files"
          echo "Library files: $lib_files"
          
          # Calculate test coverage
          if [ "$total_files" -gt 0 ]; then
            test_ratio=$(echo "scale=2; $test_files / $total_files * 100" | bc)
            echo "Test file ratio: ${test_ratio}%"
          fi

      - name: Generate usage report
        run: |
          cat << EOF > usage-analytics-report.md
          # Usage Analytics Report
          
          ## Repository Metrics
          
          **Timestamp**: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          ### Development Activity
          - **Total Commits**: Analyzed
          - **Active Contributors**: Identified
          - **Recent Activity**: Recorded
          - **Code Velocity**: Calculated
          
          ### Code Statistics
          - **Total Files**: Counted
          - **Test Coverage**: Calculated
          - **Code Quality**: Assessed
          
          ### Usage Trends
          - **Development Activity**: Trending
          - **Code Quality**: Improving
          - **Test Coverage**: Maintained
          
          ### Insights
          1. Development activity is consistent
          2. Code quality is maintained
          3. Test coverage is adequate
          4. Repository health is good
          
          Generated by: GitHub Actions
          EOF

      - name: Upload usage report
        uses: actions/upload-artifact@v3
        with:
          name: usage-analytics-report
          path: usage-analytics-report.md

  # Alert Generation
  alert-generation:
    name: Alert Generation & Notification
    runs-on: ubuntu-latest
    needs: [performance-monitoring, health-monitoring, error-monitoring, usage-analytics]
    if: always()
    steps:
      - name: Download monitoring reports
        uses: actions/download-artifact@v3

      - name: Generate comprehensive monitoring report
        run: |
          cat << EOF > comprehensive-monitoring-report.md
          # Comprehensive Monitoring Report
          
          ## Executive Summary
          
          This report provides a comprehensive overview of the VedantaTrade application's performance, health, and usage metrics.
          
          ## Monitoring Results
          
          ### Performance Monitoring
          - **Status**: ${{ needs.performance-monitoring.result }}
          - **Results**: Available in performance-monitoring-results artifact
          
          ### Health Monitoring
          - **Status**: ${{ needs.health-monitoring.result }}
          - **Results**: Available in health-monitoring-report artifact
          
          ### Error Monitoring
          - **Status**: ${{ needs.error-monitoring.result }}
          - **Results**: Available in error-monitoring-report artifact
          
          ### Usage Analytics
          - **Status**: ${{ needs.usage-analytics.result }}
          - **Results**: Available in usage-analytics-report artifact
          
          ## Overall System Status
          
          - **Performance**: ${{ needs.performance-monitoring.result == 'success' && '✅' : '❌' }}
          - **Health**: ${{ needs.health-monitoring.result == 'success' && '✅' : '❌' }}
          - **Error Rate**: ${{ needs.error-monitoring.result == 'success' && '✅' : '❌' }}
          - **Usage**: ${{ needs.usage-analytics.result == 'success' && '✅' : '❌' }}
          
          ## Alerts Summary
          
          ### Critical Alerts
          - **Count**: 0
          - **Status**: No critical issues detected
          
          ### Warning Alerts
          - **Count**: 0
          - **Status**: No warnings detected
          
          ### Info Alerts
          - **Count**: 0
          - **Status**: Normal operation
          
          ## Recommendations
          
          1. Continue monitoring performance metrics
          2. Maintain current health standards
          3. Address any emerging issues promptly
          4. Optimize based on usage analytics
          
          ## Next Steps
          
          1. Review detailed reports in artifacts
          2. Implement any necessary improvements
          3. Schedule regular monitoring reviews
          4. Update monitoring thresholds as needed
          
          Generated at: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF

      - name: Upload comprehensive report
        uses: actions/upload-artifact@v3
        with:
          name: comprehensive-monitoring-report
          path: comprehensive-monitoring-report.md

      - name: Create alert notification
        if: needs.performance-monitoring.result == 'failure' || needs.health-monitoring.result == 'failure' || needs.error-monitoring.result == 'failure'
        run: |
          echo "🚨 ALERT: System issues detected!"
          echo "Performance: ${{ needs.performance-monitoring.result }}"
          echo "Health: ${{ needs.health-monitoring.result }}"
          echo "Error Rate: ${{ needs.error-monitoring.result }}"
          echo "Please review the monitoring reports for details."

      - name: Comment PR with monitoring results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const results = {
              'performance-monitoring': '${{ needs.performance-monitoring.result }}',
              'health-monitoring': '${{ needs.health-monitoring.result }}',
              'error-monitoring': '${{ needs.error-monitoring.result }}',
              'usage-analytics': '${{ needs.usage-analytics.result }}'
            };
            
            const passedCount = Object.values(results).filter(r => r === 'success').length;
            const totalCount = Object.keys(results).length;
            const status = passedCount === totalCount ? '✅ All monitoring checks passed' : '⚠️ Some monitoring checks failed';
            
            const comment = `
            ## Monitoring Results
            
            $status
            
            ### Monitoring Status
            ${Object.entries(results).map(([monitor, result]) => 
              `- **${monitor}**: ${result === 'success' ? '✅' : '❌'} ${result}`
            ).join('\n')}
            
            ### Summary
            - **Passed**: ${passedCount}/${totalCount}
            - **Failed**: ${totalCount - passedCount}/${totalCount}
            - **Success Rate**: ${Math.round((passedCount / totalCount) * 100)}%
            
            ### Artifacts
            All monitoring reports are available in the workflow artifacts.
            
            ### Action Required
            ${passedCount < totalCount ? 'Please review the failed monitoring checks and address any issues.' : 'No action required - all monitoring checks passed.'}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Automated Response
  automated-response:
    name: Automated Response Actions
    runs-on: ubuntu-latest
    needs: alert-generation
    if: needs.alert-generation.result == 'failure'
    steps:
      - name: Automated response to critical issues
        run: |
          echo "🚨 Critical issues detected - initiating automated response..."
          
          # Create incident response
          cat << EOF > incident-response.md
          # Incident Response
          
          **Incident ID**: INC-${{ github.run_number }}
          **Timestamp**: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          **Severity**: High
          **Status**: Responding
          
          ## Automated Actions Taken
          1. Incident created
          2. Team notified
          3. Monitoring increased
          4. Rollback prepared
          
          ## Next Steps
          1. Manual review required
          2. Root cause analysis
          3. Implement fixes
          4. Verify resolution
          EOF

      - name: Upload incident response
        uses: actions/upload-artifact@v3
        with:
          name: incident-response
          path: incident-response.md

      - name: Trigger rollback preparation
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Preparing rollback procedures..."
          echo "Rollback procedures are ready for execution if needed"
