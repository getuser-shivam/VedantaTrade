name: Enhanced CI/CD Pipeline with Comprehensive Testing

on:
  push:
    branches: [ main, develop, staging, release/* ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production
        - test
        - development
      run_tests:
        description: 'Run full test suite'
        required: false
        default: true
        type: boolean
      skip_build:
        description: 'Skip build step (testing only)'
        required: false
        default: false
        type: boolean
      deploy_web:
        description: 'Deploy web version'
        required: false
        default: false
        type: boolean
      deploy_mobile:
        description: 'Deploy mobile apps'
        required: false
        default: false
        type: boolean
      run_performance_tests:
        description: 'Run performance tests'
        required: false
        default: false
        type: boolean
      run_security_tests:
        description: 'Run security tests'
        required: false
        default: false
        type: boolean

env:
  FLUTTER_VERSION: '3.19.0'
  NODE_VERSION: '20.x'
  JAVA_VERSION: '17'
  RUBY_VERSION: '3.0'
  PYTHON_VERSION: '3.11'
  GO_VERSION: '1.21'

permissions:
  contents: read
  packages: write
  pull-requests: write
  checks: write
  statuses: write
  pages: write
  id-token: write
  actions: read
  security-events: write

jobs:
  # Code Quality and Analysis
  code-quality:
    name: Code Quality & Analysis
    runs-on: ubuntu-latest
    outputs:
      should_continue: ${{ steps.changes.outputs.src == 'true' || steps.changes.outputs.pubspec == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect file changes
        id: changes
        uses: dorny/paths-filter@v2
        with:
          filters: |
            src:
              - 'lib/**/*.dart'
              - 'test/**/*.dart'
              - 'integration_test/**/*.dart'
            pubspec:
              - 'pubspec.yaml'
              - 'pubspec.lock'
            docs:
              - 'docs/**/*.md'
            config:
              - '.github/**/*.yml'
              - 'analysis_options.yaml'

      - name: Setup Flutter
        if: steps.changes.outputs.src == 'true' || steps.changes.outputs.pubspec == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        if: steps.changes.outputs.src == 'true' || steps.changes.outputs.pubspec == 'true'
        run: flutter pub get

      - name: Flutter analyze
        if: steps.changes.outputs.src == 'true' || steps.changes.outputs.pubspec == 'true'
        run: |
          flutter analyze --fatal-infos --fatal-warnings
          dart format --set-exit-if-changed .

      - name: Run custom linter
        if: steps.changes.outputs.src == 'true' || steps.changes.outputs.pubspec == 'true'
        run: |
          flutter pub run custom_lint

      - name: Check for unused dependencies
        if: steps.changes.outputs.src == 'true' || steps.changes.outputs.pubspec == 'true'
        run: |
          flutter pub deps
          dart pub outdated

      - name: Security vulnerability scan
        if: steps.changes.outputs.src == 'true' || steps.changes.outputs.pubspec == 'true'
        run: |
          flutter pub run dependency_validator
          dart pub audit

      - name: Code coverage setup
        if: steps.changes.outputs.src == 'true' || steps.changes.outputs.pubspec == 'true'
        run: |
          flutter pub global activate coverage
          flutter pub global run coverage

  # Unit Tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality
    if: needs.code-quality.outputs.should_continue == 'true' || github.event.inputs.run_tests == 'true'
    strategy:
      matrix:
        flutter-version: ['3.19.0', '3.18.0', '3.17.0']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter (${{ matrix.flutter-version }})
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter-version }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate test coverage report
        run: |
          flutter test --coverage --reporter=expanded
          genhtml coverage/lcov.info -o coverage/html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report-${{ matrix.flutter-version }}
          path: coverage/html/
          retention-days: 30

  # Integration Tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: code-quality
    if: needs.code-quality.outputs.should_continue == 'true' || github.event.inputs.run_tests == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Setup Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: google_apis
          arch: x86_64
          profile: Nexus 5X

      - name: Run integration tests
        run: |
          flutter test integration_test/
          --reporter=expanded
          --timeout=30s

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: integration-test-results
          path: test_results/
          retention-days: 7

  # Widget Tests
  widget-tests:
    name: Widget Tests
    runs-on: ubuntu-latest
    needs: code-quality
    if: needs.code-quality.outputs.should_continue == 'true' || github.event.inputs.run_tests == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run widget tests
        run: |
          flutter test test/widget/
          --coverage
          --reporter=expanded

      - name: Upload widget test coverage
        uses: actions/upload-artifact@v3
        with:
          name: widget-test-coverage
          path: coverage/
          retention-days: 30

  # Performance Tests
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: code-quality
    if: (needs.code-quality.outputs.should_continue == 'true' || github.event.inputs.run_tests == 'true') && (github.event.inputs.run_performance_tests == 'true' || github.ref == 'refs/heads/main')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Setup performance testing tools
        run: |
          flutter pub global activate devtools
          flutter pub global activate benchmark

      - name: Run performance benchmarks
        run: |
          flutter test test/performance/
          --reporter=expanded
          --timeout=60s

      - name: Generate performance report
        run: |
          flutter pub global run benchmark:report

      - name: Upload performance results
        uses: actions/upload-artifact@v3
        with:
          name: performance-test-results
          path: performance_results/
          retention-days: 30

  # Security Tests
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: code-quality
    if: (needs.code-quality.outputs.should_continue == 'true' || github.event.inputs.run_tests == 'true') && (github.event.inputs.run_security_tests == 'true' || github.ref == 'refs/heads/main')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run security tests
        run: |
          flutter test test/security/
          --reporter=expanded

      - name: Static security analysis
        run: |
          flutter pub global activate secure
          flutter pub global run secure:analyze

      - name: Dependency security scan
        run: |
          flutter pub global activate safety
          flutter pub global run safety check

      - name: Upload security results
        uses: actions/upload-artifact@v3
        with:
          name: security-test-results
          path: security_results/
          retention-days: 30

  # Build Applications
  build:
    name: Build Applications
    runs-on: ${{ matrix.os }}
    needs: [code-quality, unit-tests, widget-tests]
    if: needs.code-quality.outputs.should_continue == 'true' && github.event.inputs.skip_build != 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web application
        if: matrix.os == 'ubuntu-latest'
        run: |
          flutter build web --web-renderer canvaskit --release
          tar -czf build-web.tar.gz build/web/

      - name: Build Android APK
        if: matrix.os == 'ubuntu-latest'
        run: |
          flutter build apk --release --shrink
          flutter build appbundle --release --shrink

      - name: Build iOS application
        if: matrix.os == 'macos-latest'
        run: |
          flutter build ios --release --no-codesign

      - name: Build Windows application
        if: matrix.os == 'windows-latest'
        run: |
          flutter build windows --release

      - name: Build macOS application
        if: matrix.os == 'macos-latest'
        run: |
          flutter build macos --release

      - name: Build Linux application
        if: matrix.os == 'ubuntu-latest'
        run: |
          flutter build linux --release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-${{ matrix.platform }}
          path: |
            build/
            build-web.tar.gz
          retention-days: 7

  # Deploy Web Application
  deploy-web:
    name: Deploy Web Application
    runs-on: ubuntu-latest
    needs: [build]
    if: (github.ref == 'refs/heads/main' || github.event.inputs.deploy_web == 'true') && github.event.inputs.environment != 'test'
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-linux
          path: build/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install deployment tools
        run: |
          npm install -g firebase-tools
          npm install -g surge

      - name: Deploy to Firebase Hosting
        if: github.event.inputs.environment == 'production' || github.ref == 'refs/heads/main'
        run: |
          firebase deploy --only hosting --project vedantatrade-prod
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy to staging
        if: github.event.inputs.environment == 'staging' || github.ref == 'refs/heads/develop'
        run: |
          firebase deploy --only hosting --project vedantatrade-staging
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy to Surge.sh
        if: github.event.inputs.environment == 'test'
        run: |
          surge --project build/web --domain vedantatrade-test.surge.sh
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Get deployment URL
        id: deploy
        run: |
          if [ "${{ github.event.inputs.environment }}" = "production" ] || [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "url=https://vedantatrade.web.app" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.environment }}" = "staging" ] || [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "url=https://vedantatrade-staging.web.app" >> $GITHUB_OUTPUT
          else
            echo "url=https://vedantatrade-test.surge.sh" >> $GITHUB_OUTPUT
          fi

  # Deploy Mobile Applications
  deploy-mobile:
    name: Deploy Mobile Applications
    runs-on: ubuntu-latest
    needs: [build]
    if: (github.ref == 'refs/heads/main' || github.event.inputs.deploy_mobile == 'true') && github.event.inputs.environment != 'test'
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-linux
          path: build/

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}

      - name: Install Fastlane
        run: |
          gem install fastlane
          bundle install

      - name: Deploy to Google Play Store
        if: github.event.inputs.environment == 'production' || github.ref == 'refs/heads/main'
        run: |
          fastlane deploy_play_store
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          GOOGLE_PLAY_PUBLISH_KEY: ${{ secrets.GOOGLE_PLAY_PUBLISH_KEY }}

      - name: Deploy to App Store
        if: github.event.inputs.environment == 'production' || github.ref == 'refs/heads/main'
        run: |
          fastlane deploy_app_store
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Deploy to Firebase App Distribution
        if: github.event.inputs.environment == 'staging' || github.ref == 'refs/heads/develop'
        run: |
          fastlane deploy_firebase
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  # Docker Deployment
  deploy-docker:
    name: Docker Deployment
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production'
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: |
            vedantatrade/vedantatrade
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Kubernetes
        run: |
          echo "Deploying to Kubernetes cluster..."
          # Add your kubectl deployment commands here
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}

  # Monitoring and Alerting
  monitoring:
    name: Monitoring & Alerting
    runs-on: ubuntu-latest
    needs: [deploy-web, deploy-mobile]
    if: always() && (needs.deploy-web.result == 'success' || needs.deploy-mobile.result == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup monitoring tools
        run: |
          curl -sL https://github.com/prometheus/prometheus/releases/download/v2.40.0/prometheus-2.40.0.linux-amd64.tar.gz | tar xz
          curl -sL https://github.com/grafana/grafana/releases/download/v9.3.0/grafana-9.3.0.linux-amd64.tar.gz | tar xz

      - name: Configure monitoring
        run: |
          # Configure Prometheus and Grafana
          cp monitoring/prometheus.yml prometheus-2.40.0.linux-amd64/
          cp monitoring/grafana/dashboards/*.json grafana-9.3.0.linux-amd64/conf/provisioning/dashboards/

      - name: Start monitoring services
        run: |
          ./prometheus-2.40.0.linux-amd64/prometheus &
          ./grafana-9.3.0.linux-amd64/bin/grafana server &

      - name: Health check
        run: |
          curl -f http://localhost:9090/-/healthy || exit 1
          curl -f http://localhost:3000/api/health || exit 1

      - name: Send deployment notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()

  # Cleanup
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [monitoring]
    if: always()
    steps:
      - name: Cleanup old artifacts
        uses: actions/github-script@v6
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            
            const oldArtifacts = artifacts.data.artifacts
              .filter(artifact => {
                const createdAt = new Date(artifact.created_at);
                const daysOld = (Date.now() - createdAt) / (1000 * 60 * 60 * 24);
                return daysOld > 7;
              });
            
            for (const artifact of oldArtifacts) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
              console.log(`Deleted artifact: ${artifact.name}`);
            }

      - name: Cleanup old workflows
        uses: actions/github-script@v6
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: '.github/workflows/enhanced-ci-cd-v3.yml',
              per_page: 100,
            });
            
            const oldRuns = runs.data.workflow_runs
              .filter(run => {
                const createdAt = new Date(run.created_at);
                const daysOld = (Date.now() - createdAt) / (1000 * 60 * 60 * 24);
                return daysOld > 30 && run.status === 'completed';
              });
            
            for (const run of oldRuns) {
              await github.rest.actions.deleteWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
              });
              console.log(`Deleted workflow run: ${run.id}`);
            }
