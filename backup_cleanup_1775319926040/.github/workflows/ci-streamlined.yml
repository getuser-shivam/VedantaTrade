name: VedantaTrade CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: false
        default: 'staging'
        type: choice
        options:
        - staging
        - production
        - test
      run_tests:
        description: 'Run tests'
        required: false
        default: true
        type: boolean
      deploy_web:
        description: 'Deploy web'
        required: false
        default: false
        type: boolean
      deploy_mobile:
        description: 'Build mobile'
        required: false
        default: false
        type: boolean

env:
  FLUTTER_VERSION: '3.19.0'
  NODE_VERSION: '20.x'
  JAVA_VERSION: '17'

permissions:
  contents: read
  packages: write
  pull-requests: write
  checks: write
  statuses: write
  pages: write
  id-token: write
  actions: read
  security-events: write

jobs:
  # Code Quality & Analysis
  quality:
    name: Code Quality & Analysis
    runs-on: ubuntu-latest
    outputs:
      flutter-version: ${{ steps.setup-flutter.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        id: setup-flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --fatal-infos

      - name: Run unit tests
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false

  # Build Applications
  build:
    name: Build Applications
    runs-on: ubuntu-latest
    needs: quality
    if: github.event.inputs.deploy_mobile == 'true' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release --no-shrink

      - name: Build Android AAB
        run: flutter build appbundle --release --no-shrink

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v3
        with:
          name: android-build
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

      - name: Build Web
        run: flutter build web --release --no-tree-shake-icons

      - name: Upload web build
        uses: actions/upload-artifact@v3
        with:
          name: web-build
          path: build/web

  # Security Scanning
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          languages: dart

  # Web Deployment
  deploy-web:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [quality, build]
    if: github.event.inputs.deploy_web == 'true' || github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: |
          flutter build web --release --no-tree-shake-icons \
            --web-renderer canvaskit \
            --base-href "/vedanta-trade/"

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v2
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2

  # Performance Testing
  performance:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.run_tests == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run performance tests
        run: flutter test integration_test/performance_test.dart

      - name: Upload performance results
        uses: actions/upload-artifact@v3
        with:
          name: performance-results
          path: test_results/

  # Notification
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [quality, build, security, deploy-web, performance]
    if: always()
    steps:
      - name: Notify on success
        if: needs.quality.result == 'success' && needs.build.result == 'success'
        run: |
          echo "✅ CI/CD Pipeline completed successfully!"
          echo "📊 Quality: ${{ needs.quality.result }}"
          echo "🔨 Build: ${{ needs.build.result }}"
          echo "🔒 Security: ${{ needs.security.result }}"
          echo "🌐 Web Deploy: ${{ needs.deploy-web.result }}"

      - name: Notify on failure
        if: needs.quality.result == 'failure' || needs.build.result == 'failure'
        run: |
          echo "❌ CI/CD Pipeline failed!"
          echo "📊 Quality: ${{ needs.quality.result }}"
          echo "🔨 Build: ${{ needs.build.result }}"
          echo "🔒 Security: ${{ needs.security.result }}"
          echo "🌐 Web Deploy: ${{ needs.deploy-web.result }}"
          exit 1
