name: Continuous Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production
      version:
        description: 'Version to deploy'
        required: false
        type: string

env:
  FLUTTER_VERSION: '3.19.0'
  NODE_VERSION: '18.17.0'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/

      - name: Install dependencies
        run: |
          flutter pub get
          cd backend && npm ci

      - name: Build Flutter Web
        run: flutter build web --release

      - name: Build Backend
        working-directory: backend
        run: npm run build

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment..."
          # Add your staging deployment commands here
          # Example: AWS S3, Vercel, Netlify, etc.
          
      - name: Run Smoke Tests
        run: |
          echo "Running smoke tests on staging..."
          # Add smoke test commands here
          
      - name: Notify Deployment
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"🚀 Staging deployment successful for ${{ github.repository }} - ${{ github.sha }}"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }} || echo "Slack notification skipped"

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event.inputs.environment == 'production'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/

      - name: Install dependencies
        run: |
          flutter pub get
          cd backend && npm ci

      - name: Build Flutter Web
        run: flutter build web --release

      - name: Build Backend
        working-directory: backend
        run: npm run build

      - name: Deploy to Production
        run: |
          echo "Deploying to production environment..."
          # Add your production deployment commands here
          
      - name: Run Production Tests
        run: |
          echo "Running production tests..."
          # Add production test commands here
          
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            Automated release from commit ${{ github.sha }}
            
            ## Changes
            - Automated deployment from main branch
            - Built and tested on ${{ github.event.head_commit.timestamp }}
            
            ## Build Information
            - Flutter Version: ${{ env.FLUTTER_VERSION }}
            - Node Version: ${{ env.NODE_VERSION }}
            - Commit: ${{ github.sha }}
          draft: false
          prerelease: false

      - name: Notify Deployment
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"🎉 Production deployment successful for ${{ github.repository }} - v${{ github.run_number }}"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }} || echo "Slack notification skipped"

  # Mobile App Deployment
  deploy-mobile:
    name: Deploy Mobile Apps
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event.inputs.environment == 'production'
    strategy:
      matrix:
        platform: [android, ios]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Java (for Android)
        if: matrix.platform == 'android'
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: flutter pub get

      - name: Build ${{ matrix.platform }}
        run: |
          if [ "${{ matrix.platform }}" = "android" ]; then
            flutter build apk --release
            flutter build appbundle --release
          elif [ "${{ matrix.platform }}" = "ios" ]; then
            flutter build ios --release --no-codesign
          fi

      - name: Upload Android to Play Store
        if: matrix.platform == 'android'
        run: |
          echo "Uploading to Google Play Store..."
          # Add Google Play Console upload commands here
          
      - name: Upload iOS to App Store
        if: matrix.platform == 'ios'
        run: |
          echo "Uploading to Apple App Store..."
          # Add App Store Connect upload commands here

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-build-${{ matrix.platform }}
          path: |
            build/app/outputs/flutter-apk/
            build/app/outputs/bundle/
            build/ios/

  # Database Migration
  migrate-database:
    name: Database Migration
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run Database Migrations
        working-directory: backend
        run: |
          npx prisma migrate deploy
          npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      - name: Seed Production Data
        working-directory: backend
        run: npm run seed:prod
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

  # GitHub Pages Deployment (Legacy)
  deploy-github-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: flutter pub get

      - name: Build web release
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Health Check
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-production, migrate-database]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Wait for Deployment
        run: sleep 60

      - name: Health Check
        run: |
          echo "Performing health check..."
          # Add health check commands here
          # Example: curl -f https://your-app.com/health || exit 1
          
      - name: Performance Check
        run: |
          echo "Performing performance check..."
          # Add performance monitoring commands here
          
      - name: Security Check
        run: |
          echo "Performing security check..."
          # Add security validation commands here

  # Rollback on Failure
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy-production, health-check]
    if: failure() && github.ref == 'refs/heads/main'
    steps:
      - name: Rollback Deployment
        run: |
          echo "Rolling back deployment..."
          # Add rollback commands here
          
      - name: Notify Rollback
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"🚨 Deployment rollback initiated for ${{ github.repository }} - ${{ github.sha }}"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }} || echo "Slack notification skipped"

  # Post-Deployment Tasks
  post-deployment:
    name: Post-Deployment Tasks
    runs-on: ubuntu-latest
    needs: [deploy-production, health-check]
    if: github.ref == 'refs/heads/main' && success()
    steps:
      - name: Update Documentation
        run: |
          echo "Updating API documentation..."
          # Add documentation update commands here
          
      - name: Clear Caches
        run: |
          echo "Clearing CDN caches..."
          # Add cache clearing commands here
          
      - name: Analytics Tracking
        run: |
          echo "Tracking deployment analytics..."
          # Add analytics tracking commands here
          
      - name: Success Notification
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"✅ Full deployment pipeline completed successfully for ${{ github.repository }} - v${{ github.run_number }}"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }} || echo "Slack notification skipped"
