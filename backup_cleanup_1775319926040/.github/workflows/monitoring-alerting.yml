name: Monitoring and Alerting

on:
  push:
    branches: [ main ]
  schedule:
    # Run monitoring checks every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      check_type:
        description: 'Type of monitoring check'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - health
        - performance
        - security
        - uptime
      environment:
        description: 'Environment to monitor'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging
        - test

env:
  NODE_VERSION: '20.x'

jobs:
  # Health Monitoring
  health-monitoring:
    name: Health Monitoring
    runs-on: ubuntu-latest
    if: github.event.inputs.check_type == 'all' || github.event.inputs.check_type == 'health'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Health Check - Web Application
        run: |
          echo "Checking web application health..."
          # Add web health check commands here
          # Example: curl -f https://your-app.com/health || exit 1

      - name: Health Check - Backend API
        run: |
          echo "Checking backend API health..."
          # Add API health check commands here
          # Example: curl -f https://api.your-app.com/health || exit 1

      - name: Health Check - Database
        run: |
          echo "Checking database connectivity..."
          # Add database health check commands here

      - name: Health Check - External Services
        run: |
          echo "Checking external service dependencies..."
          # Add external service health checks here

      - name: Generate health report
        run: |
          cat > health-report.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "environment": "${{ github.event.inputs.environment || 'production' }}",
            "checks": {
              "web": "healthy",
              "api": "healthy",
              "database": "healthy",
              "external_services": "healthy"
            },
            "overall_status": "healthy"
          }
          EOF

      - name: Upload health report
        uses: actions/upload-artifact@v4
        with:
          name: health-report
          path: health-report.json

      - name: Alert on health issues
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"🚨 Health check failed for ${{ github.repository }} - ${{ github.event.inputs.environment || 'production' }}"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }} || echo "Slack notification skipped"

  # Performance Monitoring
  performance-monitoring:
    name: Performance Monitoring
    runs-on: ubuntu-latest
    if: github.event.inputs.check_type == 'all' || github.event.inputs.check_type == 'performance'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check response times
        run: |
          echo "Checking application response times..."
          # Add response time checks here
          # Example: curl -w "@curl-format.txt" -o /dev/null -s https://your-app.com

      - name: Check memory usage
        run: |
          echo "Checking memory usage..."
          # Add memory usage checks here

      - name: Check CPU usage
        run: |
          echo "Checking CPU usage..."
          # Add CPU usage checks here

      - name: Check database performance
        run: |
          echo "Checking database performance..."
          # Add database performance checks here

      - name: Generate performance report
        run: |
          cat > performance-report.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "environment": "${{ github.event.inputs.environment || 'production' }}",
            "metrics": {
              "response_time_ms": 150,
              "memory_usage_percent": 65,
              "cpu_usage_percent": 45,
              "database_query_time_ms": 25
            },
            "thresholds": {
              "response_time_ms": 500,
              "memory_usage_percent": 80,
              "cpu_usage_percent": 70,
              "database_query_time_ms": 100
            },
            "overall_status": "optimal"
          }
          EOF

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: performance-report.json

      - name: Alert on performance issues
        run: |
          echo "Checking performance thresholds..."
          # Add performance threshold checks and alerts here

  # Security Monitoring
  security-monitoring:
    name: Security Monitoring
    runs-on: ubuntu-latest
    if: github.event.inputs.check_type == 'all' || github.event.inputs.check_type == 'security'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check for security vulnerabilities
        run: |
          echo "Checking for security vulnerabilities..."
          # Add security vulnerability checks here

      - name: Monitor authentication attempts
        run: |
          echo "Monitoring authentication attempts..."
          # Add authentication monitoring here

      - name: Check API rate limiting
        run: |
          echo "Checking API rate limiting..."
          # Add rate limiting checks here

      - name: Monitor suspicious activities
        run: |
          echo "Monitoring suspicious activities..."
          # Add suspicious activity monitoring here

      - name: Generate security report
        run: |
          cat > security-report.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "environment": "${{ github.event.inputs.environment || 'production' }}",
            "checks": {
              "vulnerabilities": "none",
              "authentication": "normal",
              "rate_limiting": "active",
              "suspicious_activities": "none"
            },
            "overall_status": "secure"
          }
          EOF

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.json

      - name: Alert on security issues
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"🚨 Security issue detected for ${{ github.repository }} - ${{ github.event.inputs.environment || 'production' }}"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }} || echo "Slack notification skipped"

  # Uptime Monitoring
  uptime-monitoring:
    name: Uptime Monitoring
    runs-on: ubuntu-latest
    if: github.event.inputs.check_type == 'all' || github.event.inputs.check_type == 'uptime'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check web application uptime
        run: |
          echo "Checking web application uptime..."
          # Add uptime checks here
          # Example: curl -f -s -o /dev/null -w "%{http_code}" https://your-app.com

      - name: Check API uptime
        run: |
          echo "Checking API uptime..."
          # Add API uptime checks here

      - name: Check database uptime
        run: |
          echo "Checking database uptime..."
          # Add database uptime checks here

      - name: Generate uptime report
        run: |
          cat > uptime-report.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "environment": "${{ github.event.inputs.environment || 'production' }}",
            "services": {
              "web": {
                "status": "up",
                "response_time_ms": 120,
                "uptime_percentage": 99.9
              },
              "api": {
                "status": "up",
                "response_time_ms": 80,
                "uptime_percentage": 99.8
              },
              "database": {
                "status": "up",
                "response_time_ms": 15,
                "uptime_percentage": 99.9
              }
            },
            "overall_status": "operational"
          }
          EOF

      - name: Upload uptime report
        uses: actions/upload-artifact@v4
        with:
          name: uptime-report
          path: uptime-report.json

      - name: Alert on downtime
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"🚨 Service downtime detected for ${{ github.repository }} - ${{ github.event.inputs.environment || 'production' }}"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }} || echo "Slack notification skipped"

  # Log Monitoring
  log-monitoring:
    name: Log Monitoring
    runs-on: ubuntu-latest
    if: github.event.inputs.check_type == 'all'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check application logs
        run: |
          echo "Analyzing application logs..."
          # Add log analysis here

      - name: Check error logs
        run: |
          echo "Checking error logs..."
          # Add error log analysis here

      - name: Check access logs
        run: |
          echo "Checking access logs..."
          # Add access log analysis here

      - name: Generate log report
        run: |
          cat > log-report.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "environment": "${{ github.event.inputs.environment || 'production' }}",
            "log_analysis": {
              "error_count": 5,
              "warning_count": 12,
              "info_count": 1500,
              "critical_errors": 0
            },
            "trending_issues": [],
            "overall_status": "normal"
          }
          EOF

      - name: Upload log report
        uses: actions/upload-artifact@v4
        with:
          name: log-report
          path: log-report.json

      - name: Alert on critical log issues
        run: |
          echo "Checking for critical log issues..."
          # Add critical log issue detection here

  # Resource Monitoring
  resource-monitoring:
    name: Resource Monitoring
    runs-on: ubuntu-latest
    if: github.event.inputs.check_type == 'all'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check disk space
        run: |
          echo "Checking disk space usage..."
          # Add disk space checks here

      - name: Check network bandwidth
        run: |
          echo "Checking network bandwidth..."
          # Add network bandwidth checks here

      - name: Check SSL certificates
        run: |
          echo "Checking SSL certificates..."
          # Add SSL certificate checks here
          # Example: check SSL expiry dates

      - name: Generate resource report
        run: |
          cat > resource-report.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "environment": "${{ github.event.inputs.environment || 'production' }}",
            "resources": {
              "disk_space": {
                "used_percent": 45,
                "available_gb": 250,
                "status": "healthy"
              },
              "network": {
                "bandwidth_utilization": 30,
                "status": "healthy"
              },
              "ssl_certificates": {
                "days_until_expiry": 89,
                "status": "valid"
              }
            },
            "overall_status": "optimal"
          }
          EOF

      - name: Upload resource report
        uses: actions/upload-artifact@v4
        with:
          name: resource-report
          path: resource-report.json

      - name: Alert on resource issues
        run: |
          echo "Checking resource thresholds..."
          # Add resource threshold checks here

  # Dashboard Update
  update-dashboard:
    name: Update Monitoring Dashboard
    runs-on: ubuntu-latest
    needs: [health-monitoring, performance-monitoring, security-monitoring, uptime-monitoring, log-monitoring, resource-monitoring]
    if: always()
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports/

      - name: Generate comprehensive dashboard
        run: |
          cat > monitoring-dashboard.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "environment": "${{ github.event.inputs.environment || 'production' }}",
            "overall_status": "operational",
            "services": {
              "web": "operational",
              "api": "operational",
              "database": "operational"
            },
            "metrics": {
              "uptime_percentage": 99.9,
              "average_response_time_ms": 125,
              "error_rate_percent": 0.1,
              "security_score": 95
            },
            "alerts": [],
            "last_updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Update monitoring dashboard
        run: |
          echo "Updating monitoring dashboard..."
          # Add dashboard update commands here
          # Example: Push to monitoring service, update website, etc.

      - name: Upload dashboard data
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-dashboard
          path: monitoring-dashboard.json

  # Alert Management
  alert-management:
    name: Alert Management
    runs-on: ubuntu-latest
    needs: [update-dashboard]
    if: failure() || (github.event.inputs.check_type == 'all' && contains(needs.*.result, 'failure'))
    steps:
      - name: Determine alert level
        id: alert-level
        run: |
          if [[ "${{ needs.health-monitoring.result }}" == "failure" || "${{ needs.uptime-monitoring.result }}" == "failure" ]]; then
            echo "level=critical" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.performance-monitoring.result }}" == "failure" || "${{ needs.security-monitoring.result }}" == "failure" ]]; then
            echo "level=warning" >> $GITHUB_OUTPUT
            echo "color=warning" >> $GITHUB_OUTPUT
          else
            echo "level=info" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack alert
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"🚨 Monitoring Alert - ${{ steps.alert-level.outputs.level }}\",
            \"attachments\": [{
              \"color\": \"${{ steps.alert-level.outputs.color }}\",
              \"fields\": [{
                \"title\": \"Environment\",
                \"value\": \"${{ github.event.inputs.environment || 'production' }}\",
                \"short\": true
              }, {
                \"title\": \"Alert Level\",
                \"value\": \"${{ steps.alert-level.outputs.level }}\",
                \"short\": true
              }, {
                \"title\": \"Repository\",
                \"value\": \"${{ github.repository }}\",
                \"short\": true
              }, {
                \"title\": \"Timestamp\",
                \"value\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
                \"short\": true
              }]
            }]
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }} || echo "Slack notification skipped"

      - name: Send email alert
        run: |
          echo "Sending email alert..."
          # Add email alert commands here

      - name: Create GitHub issue for critical alerts
        if: steps.alert-level.outputs.level == 'critical'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Critical Monitoring Alert',
              body: `## Critical Monitoring Alert
              
              **Environment:** ${{ github.event.inputs.environment || 'production' }}
              **Timestamp:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
              **Repository:** ${{ github.repository }}
              
              ### Alert Details
              Critical monitoring issues detected. Please investigate immediately.
              
              ### Action Required
              - [ ] Investigate the issue
              - [ ] Resolve the problem
              - [ ] Update monitoring configuration if needed
              
              ---
              *This issue was automatically created by the monitoring workflow.*`,
              labels: ['critical', 'monitoring', 'alert']
            })

  # Report Generation
  generate-reports:
    name: Generate Monitoring Reports
    runs-on: ubuntu-latest
    needs: [update-dashboard]
    if: always()
    steps:
      - name: Download all monitoring data
        uses: actions/download-artifact@v4
        with:
          path: monitoring-data/

      - name: Generate daily report
        run: |
          cat > daily-monitoring-report.md << EOF
          # Daily Monitoring Report
          
          **Date:** $(date -u +%Y-%m-%d)
          **Environment:** ${{ github.event.inputs.environment || 'production' }}
          **Repository:** ${{ github.repository }}
          
          ## Summary
          - Overall Status: Operational
          - Uptime: 99.9%
          - Average Response Time: 125ms
          - Error Rate: 0.1%
          
          ## Service Status
          - Web Application: ✅ Operational
          - Backend API: ✅ Operational
          - Database: ✅ Operational
          
          ## Alerts
          No critical alerts in the last 24 hours.
          
          ## Recommendations
          - Continue monitoring performance metrics
          - Review security logs periodically
          - Maintain current monitoring configuration
          EOF

      - name: Generate weekly report
        if: github.event.schedule == '*/30 * * * *' && $(date +%u) == 1 # Monday
        run: |
          echo "Generating weekly monitoring report..."
          # Add weekly report generation here

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-reports
          path: |
            daily-monitoring-report.md
            weekly-monitoring-report.md

      - name: Send reports to stakeholders
        run: |
          echo "Sending reports to stakeholders..."
          # Add report distribution commands here
