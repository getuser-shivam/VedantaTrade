name: Mobile App Deployment

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # Android Deployment
  deploy-android:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.2'
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Build Android APK
      run: |
        flutter build apk --release --split-debug-info --obfuscate --split-per-abi
        
    - name: Build Android App Bundle
      run: |
        flutter build appbundle --release --obfuscate
        
    - name: Sign APK (if keystore available)
      if: secrets.KEYSTORE_BASE64 != ''
      run: |
        echo ${{ secrets.KEYSTORE_BASE64 }} | base64 -d > android/app/key.jks
        flutter build apk --release --split-debug-info --obfuscate --split-per-abi
        
    - name: Upload Android artifacts
      uses: actions/upload-artifact@v3
      with:
        name: android-release
        path: |
          build/app/outputs/flutter-apk/
          build/app/outputs/bundle/release/
        retention-days: 30
        
    - name: Deploy to Google Play Console
      if: secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY != ''
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY }}
        packageName: np.com.vedantatrade.app
        releaseFiles: build/app/outputs/bundle/release/app-release.aab
        track: production
        status: completed
        whatsNewDirectory: fastlane/metadata/android

  # iOS Deployment
  deploy-ios:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.2'
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.0'
        
    - name: Install CocoaPods
      run: |
        cd ios
        pod install
        
    - name: Build iOS IPA
      run: |
        flutter build ios --release --obfuscate --no-codesign
        
    - name: Code Sign iOS (if certificates available)
      if: secrets.IOS_DISTRIBUTION_CERTIFICATE != ''
      run: |
        # Create variables
        CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
        PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
        
        # Import certificates and provisioning profile
        echo -n "$IOS_DISTRIBUTION_CERTIFICATE" | base64 --decode --output - > $CERTIFICATE_PATH
        echo -n "$IOS_PROVISIONING_PROFILE" | base64 --decode --output - > $PP_PATH
        
        # Build and sign
        flutter build ios --release --obfuscate --codesign
        
    - name: Upload iOS artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ios-release
        path: |
          build/ios/ipa/
          ios/Runner.xcodeproj/project.xcworkspace/xcuserdata/
        retention-days: 30
        
    - name: Deploy to TestFlight
      if: secrets.APPLE_ID != ''
      uses: apple-actions/upload-testflight-build@v1
      with:
        app-id: ${{ secrets.APPLE_ID }}
        app-type: ios
        username: ${{ secrets.APPLE_USERNAME }}
        password: ${{ secrets.APPLE_PASSWORD }}
        issuer-id: ${{ secrets.APPLE_ISSUER_ID }}
        file-path: build/ios/ipa/vedantatrade.ipa

  # Cross-Platform Build
  build-cross-platform:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [web, windows, linux, macos]
        
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.2'
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Build for ${{ matrix.platform }}
      run: |
        case "${{ matrix.platform }}" in
          "web")
            flutter build web --web-renderer canvaskit --no-tree-shake-icons
            ;;
          "windows")
            flutter build windows --release --obfuscate
            ;;
          "linux")
            flutter build linux --release --obfuscate
            ;;
          "macos")
            flutter build macos --release --obfuscate
            ;;
        esac
        
    - name: Package ${{ matrix.platform }} build
      run: |
        case "${{ matrix.platform }}" in
          "windows")
            cd build/windows/x64/runner/Release
            zip -r ../../vedantatrade-windows.zip .
            ;;
          "linux")
            cd build/linux/x64/release/bundle
            tar -czf ../../../vedantatrade-linux.tar.gz .
            ;;
          "macos")
            cd build/macos/Build/Products/Release
            zip -r ../../../vedantatrade-macos.zip .
            ;;
        esac
        
    - name: Upload ${{ matrix.platform }} artifacts
      uses: actions/upload-artifact@v3
      with:
        name: vedantatrade-${{ matrix.platform }}
        path: |
          build/web/
          build/vedantatrade-windows.zip
          build/vedantatrade-linux.tar.gz
          build/vedantatrade-macos.zip
        retention-days: 30

  # Performance Testing
  performance-test:
    needs: [build-cross-platform]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Download web build
      uses: actions/download-artifact@v3
      with:
        name: vedantatrade-web
        path: build/
        
    - name: Run performance tests
      run: |
        # Install Lighthouse CI
        npm install -g @lhci/cli@0.12.x
        
        # Create lighthouserc.json
        cat > lighthouserc.json << EOF
        {
          "ci": {
            "collect": {
              "numberOfRuns": 3,
              "settings": {
                "chromeFlags": "--no-sandbox --headless"
              }
            },
            "assert": {
              "assertions": {
                "categories:performance": ["warn", {"minScore": 0.8}],
                "categories:accessibility": ["error", {"minScore": 0.9}],
                "categories:best-practices": ["warn", {"minScore": 0.8}],
                "categories:seo": ["warn", {"minScore": 0.8}]
              }
            },
            "upload": {
              "target": "temporary-public-storage"
            }
          }
        }
        EOF
        
        # Run Lighthouse CI
        lhci autorun
      env:
        LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # Store Deployment
  deploy-stores:
    needs: [deploy-android, deploy-ios]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Deploy to alternative stores
      run: |
        echo "Deploying to alternative app stores..."
        
        # Huawei AppGallery (if credentials available)
        if [ -n "$HUAWEI_APPGALLERY_CLIENT_ID" ]; then
          echo "Deploying to Huawei AppGallery..."
          # Add Huawei deployment logic here
        fi
        
        # Amazon Appstore (if credentials available)
        if [ -n "$AMAZON_APPSTORE_CLIENT_ID" ]; then
          echo "Deploying to Amazon Appstore..."
          # Add Amazon deployment logic here
        fi
        
        # Samsung Galaxy Store (if credentials available)
        if [ -n "$SAMSUNG_APPSTORE_CLIENT_ID" ]; then
          echo "Deploying to Samsung Galaxy Store..."
          # Add Samsung deployment logic here
        fi
      env:
        HUAWEI_APPGALLERY_CLIENT_ID: ${{ secrets.HUAWEI_APPGALLERY_CLIENT_ID }}
        AMAZON_APPSTORE_CLIENT_ID: ${{ secrets.AMAZON_APPSTORE_CLIENT_ID }}
        SAMSUNG_APPSTORE_CLIENT_ID: ${{ secrets.SAMSUNG_APPSTORE_CLIENT_ID }}

  # Deployment Summary
  deployment-summary:
    needs: [deploy-android, deploy-ios, build-cross-platform, deploy-stores]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Create deployment summary
      run: |
        echo "# Mobile App Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Deployment Status" >> $GITHUB_STEP_SUMMARY
        echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Android | ${{ needs.deploy-android.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| iOS | ${{ needs.deploy-ios.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Web | ${{ needs.build-cross-platform.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Windows | ${{ needs.build-cross-platform.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Linux | ${{ needs.build-cross-platform.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| macOS | ${{ needs.build-cross-platform.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Alternative Stores | ${{ needs.deploy-stores.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Overall deployment status
        if [[ "${{ needs.deploy-android.result }}" == "success" || "${{ needs.deploy-ios.result }}" == "success" ]]; then
          echo "✅ Mobile deployment completed successfully!" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ Some mobile deployments failed" >> $GITHUB_STEP_SUMMARY
        fi
        
    - name: Notify deployment status
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        
    - name: Create release tag
      if: success() && github.ref == 'refs/heads/main'
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: VedantaTrade v${{ github.run_number }}
        body: |
          ## 🚀 VedantaTrade v${{ github.run_number }}
          
          ### 📱 Mobile App Deployment
          - ✅ Android APK and AAB built
          - ✅ iOS IPA built and signed
          - ✅ Cross-platform builds completed
          
          ### 📦 Download Links
          - **Android APK**: Available in Google Play Console
          - **iOS IPA**: Available in TestFlight
          - **Web App**: https://vedantatrade.com
          
          ### 🔧 Technical Details
          - **Flutter Version**: 3.41.2
          - **Build Type**: Release with Obfuscation
          - **Code Signing**: Production certificates
          
          ### 📋 Installation Instructions
          1. **Android**: Download from Google Play Store
          2. **iOS**: Download from TestFlight (public link coming soon)
          3. **Web**: Visit https://vedantatrade.com
          
          ---
          🤖 Automated by GitHub Actions
        draft: false
        prerelease: false
