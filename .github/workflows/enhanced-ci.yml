name: VedantaTrade Enhanced CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: false
        default: 'staging'
        type: choice
        options:
        - staging
        - production
        - test
      run_performance_tests:
        description: 'Run performance tests'
        required: false
        default: true
        type: boolean
      run_accessibility_tests:
        description: 'Run accessibility tests'
        required: false
        default: true
        type: boolean
      deploy_web:
        description: 'Deploy web'
        required: false
        default: false
        type: boolean
      deploy_mobile:
        description: 'Build mobile'
        required: false
        default: false
        type: boolean
      deploy_app_store:
        description: 'Deploy to app stores'
        required: false
        default: false
        type: boolean

env:
  FLUTTER_VERSION: '3.19.0'
  NODE_VERSION: '20.x'
  JAVA_VERSION: '17'
  RUBY_VERSION: '3.2'

permissions:
  contents: read
  packages: write
  pull-requests: write
  security-events: write
  actions: read
  checks: write
  id-token: write

jobs:
  # Code Quality & Analysis
  quality:
    name: Code Quality & Analysis
    runs-on: ubuntu-latest
    outputs:
      flutter-version: ${{ steps.setup-flutter.outputs.version }}
      test-status: ${{ steps.test.outputs.status }}
      coverage: ${{ steps.coverage.outputs.percentage }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        id: setup-flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate dependencies
        run: flutter pub deps --style=tree

      - name: Analyze code
        run: flutter analyze --fatal-infos

      - name: Check code formatting
        run: dart format --set-exit-if-changed .

      - name: Run unit tests
        id: test
        run: |
          flutter test --coverage --reporter=json > test-results.json || true
          echo "status=$(cat test-results.json | jq -r '.status')" >> $GITHUB_OUTPUT

      - name: Generate coverage report
        id: coverage
        run: |
          genhtml coverage/lcov.info -o coverage/html
          percentage=$(lcov --summary coverage/lcov.info | grep "lines......:" | awk '{print $2}' | sed 's/%//')
          echo "percentage=$percentage" >> $GITHUB_OUTPUT

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false
          flags: unittests
          name: codecov-umbrella

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: |
            test-results.json
            coverage/html

  # Enhanced Testing Suite
  enhanced-testing:
    name: Enhanced Testing Suite
    runs-on: ubuntu-latest
    needs: quality
    if: github.event.inputs.run_performance_tests == 'true' || github.event.inputs.run_accessibility_tests == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run UI Components Validation
        if: github.event.inputs.run_performance_tests == 'true'
        run: dart scripts/validate_ui_components.dart

      - name: Run Performance & Accessibility Tests
        if: github.event.inputs.run_performance_tests == 'true' || github.event.inputs.run_accessibility_tests == 'true'
        run: dart scripts/validate_performance_accessibility.dart

      - name: Run Widget Tests
        run: flutter test --coverage test/widget/ --reporter=json > widget-test-results.json || true

      - name: Run Integration Tests
        run: flutter test --coverage test/integration/ --reporter=json > integration-test-results.json || true

      - name: Upload enhanced test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: enhanced-test-results
          path: |
            widget-test-results.json
            integration-test-results.json
            docs/*validation-report.md

  # Performance Benchmarking
  performance-benchmark:
    name: Performance Benchmarking
    runs-on: ubuntu-latest
    needs: quality
    if: github.event.inputs.run_performance_tests == 'true' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build for performance testing
        run: flutter build web --release --no-tree-shake-icons

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.12.x

      - name: Run Lighthouse CI
        run: |
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci

  # Multi-Platform Build System
  build:
    name: Build Applications
    runs-on: ubuntu-latest
    needs: [quality, enhanced-testing]
    if: github.event.inputs.deploy_mobile == 'true' || github.ref == 'refs/heads/main'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        platform: [android, web, ios]
        exclude:
          - os: ubuntu-latest
            platform: ios
          - os: windows-latest
            platform: ios
          - os: macos-latest
            platform: android
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Xcode (iOS)
        if: matrix.platform == 'ios'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        if: matrix.platform == 'android'
        run: flutter build apk --release --no-shrink

      - name: Build Android AAB
        if: matrix.platform == 'android'
        run: flutter build appbundle --release --no-shrink

      - name: Build iOS
        if: matrix.platform == 'ios'
        run: flutter build ios --release --no-codesign

      - name: Build Web
        if: matrix.platform == 'web'
        run: |
          flutter build web --release --no-tree-shake-icons \
            --web-renderer canvaskit \
            --base-href "/vedanta-trade/"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.platform }}-${{ matrix.os }}-build
          path: |
            ${{ matrix.platform == 'android' && 'build/app/outputs/' || '' }}
            ${{ matrix.platform == 'web' && 'build/web' || '' }}
            ${{ matrix.platform == 'ios' && 'build/ios/' || '' }}

  # Security Scanning
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          languages: dart

      - name: Run npm audit (if backend exists)
        run: |
          if [ -d "backend" ]; then
            cd backend && npm audit --audit-level high
          fi

      - name: Check for hardcoded secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD

  # Web Deployment
  deploy-web:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [quality, enhanced-testing, build, security]
    if: github.event.inputs.deploy_web == 'true' || github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web with optimizations
        run: |
          flutter build web --release --no-tree-shake-icons \
            --web-renderer canvaskit \
            --base-href "/vedanta-trade/" \
            --dart-define=FLUTTER_WEB_CANVASKIT_URL=canvaskit.wasm

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v2
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2

  # Mobile App Store Deployment
  deploy-mobile:
    name: Deploy Mobile Apps
    runs-on: macos-latest
    needs: [quality, enhanced-testing, build, security]
    if: github.event.inputs.deploy_app_store == 'true' || (github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch')
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Ruby (for Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}

      - name: Install dependencies
        run: |
          flutter pub get
          gem install fastlane

      - name: Build Android Release
        run: flutter build appbundle --release

      - name: Deploy to Google Play Console
        run: |
          fastlane deploy_android
        env:
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}

      - name: Build iOS Release
        run: |
          flutter build ios --release --no-codesign
          fastlane build_ios

      - name: Deploy to App Store
        run: |
          fastlane deploy_ios
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

  # Monitoring and Alerting
  monitoring:
    name: Monitoring & Alerting
    runs-on: ubuntu-latest
    needs: [quality, enhanced-testing, build, security, deploy-web, deploy-mobile]
    if: always()
    steps:
      - name: Generate deployment report
        run: |
          cat << EOF > deployment-report.md
          # Deployment Report
          
          ## Pipeline Status
          - Quality: ${{ needs.quality.result }}
          - Enhanced Testing: ${{ needs.enhanced-testing.result }}
          - Build: ${{ needs.build.result }}
          - Security: ${{ needs.security.result }}
          - Web Deploy: ${{ needs.deploy-web.result }}
          - Mobile Deploy: ${{ needs.deploy-mobile.result }}
          
          ## Performance Metrics
          - Test Coverage: ${{ needs.quality.outputs.coverage || 'N/A' }}%
          - Flutter Version: ${{ needs.quality.outputs.flutter-version }}
          
          ## Artifacts
          - Test Results: Available in artifacts
          - Build Artifacts: Available in artifacts
          - Lighthouse Results: Available in artifacts
          
          Generated at: $(date)
          EOF

      - name: Upload deployment report
        uses: actions/upload-artifact@v3
        with:
          name: deployment-report
          path: deployment-report.md

      - name: Notify on success
        if: needs.quality.result == 'success' && needs.build.result == 'success'
        run: |
          echo "✅ CI/CD Pipeline completed successfully!"
          echo "📊 Quality: ${{ needs.quality.result }}"
          echo "🧪 Enhanced Testing: ${{ needs.enhanced-testing.result }}"
          echo "🔨 Build: ${{ needs.build.result }}"
          echo "🔒 Security: ${{ needs.security.result }}"
          echo "🌐 Web Deploy: ${{ needs.deploy-web.result }}"
          echo "📱 Mobile Deploy: ${{ needs.deploy-mobile.result }}"

      - name: Notify on failure
        if: needs.quality.result == 'failure' || needs.build.result == 'failure'
        run: |
          echo "❌ CI/CD Pipeline failed!"
          echo "📊 Quality: ${{ needs.quality.result }}"
          echo "🧪 Enhanced Testing: ${{ needs.enhanced-testing.result }}"
          echo "🔨 Build: ${{ needs.build.result }}"
          echo "🔒 Security: ${{ needs.security.result }}"
          echo "🌐 Web Deploy: ${{ needs.deploy-web.result }}"
          echo "📱 Mobile Deploy: ${{ needs.deploy-mobile.result }}"
          exit 1

  # Backend Services (if exists)
  backend:
    name: Backend Services
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run Lint
        working-directory: backend
        run: npm run lint

      - name: Build check
        working-directory: backend
        run: npm run build

      - name: Run tests
        working-directory: backend
        run: npm test || echo "No tests implemented yet"

      - name: Security audit
        working-directory: backend
        run: npm audit --audit-level high
