name: Performance Monitoring

on:
  schedule:
    # Run performance tests daily at 6 AM UTC
    - cron: '0 6 * * *'
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of performance test'
        required: true
        default: 'full'
        type: choice
        options:
        - full
        - load
        - memory
        - network
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  FLUTTER_VERSION: '3.19.0'
  NODE_VERSION: '18.17.0'

jobs:
  # Flutter Performance Tests
  flutter-performance:
    name: Flutter Performance Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build for performance testing
        run: flutter build web --release --profile

      - name: Run Flutter performance tests
        run: |
          flutter test integration_test/performance_test.dart --profile
          
      - name: Generate performance report
        run: |
          echo "# Flutter Performance Report" > flutter-performance.md
          echo "Generated on: $(date)" >> flutter-performance.md
          echo "" >> flutter-performance.md
          echo "## Metrics" >> flutter-performance.md
          echo "- Build time: $(flutter build --help | grep -i time || echo 'N/A')" >> flutter-performance.md
          echo "- Bundle size: $(du -sh build/web | cut -f1)" >> flutter-performance.md
          echo "- Performance score: $(grep -r 'performance' integration_test/ | wc -l || echo '0')" >> flutter-performance.md

      - name: Upload Flutter performance results
        uses: actions/upload-artifact@v4
        with:
          name: flutter-performance-results
          path: |
            flutter-performance.md
            integration_test/performance/

  # Backend Performance Tests
  backend-performance:
    name: Backend Performance Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: vedantatrade_perf
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Setup Prisma
        working-directory: backend
        run: npx prisma generate

      - name: Run database migrations
        working-directory: backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vedantatrade_perf

      - name: Run backend performance tests
        working-directory: backend
        run: |
          npm run test:performance
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vedantatrade_perf
          NODE_ENV: test

      - name: Run load tests
        working-directory: backend
        run: |
          npm run test:load
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vedantatrade_perf
          NODE_ENV: test

      - name: Generate backend performance report
        working-directory: backend
        run: |
          echo "# Backend Performance Report" > backend-performance.md
          echo "Generated on: $(date)" >> backend-performance.md
          echo "" >> backend-performance.md
          echo "## API Performance" >> backend-performance.md
          echo "- Response time: $(npm run test:api-performance | grep -o '[0-9]*ms' | head -1 || echo 'N/A')" >> backend-performance.md
          echo "- Throughput: $(npm run test:throughput | grep -o '[0-9]* req/s' || echo 'N/A')" >> backend-performance.md
          echo "- Error rate: $(npm run test:error-rate | grep -o '[0-9]*%' || echo 'N/A')" >> backend-performance.md
          echo "" >> backend-performance.md
          echo "## Database Performance" >> backend-performance.md
          echo "- Query time: $(npm run test:db-performance | grep -o '[0-9]*ms' || echo 'N/A')" >> backend-performance.md
          echo "- Connection pool: $(npm run test:db-pool | grep -o '[0-9]*' || echo 'N/A')" >> backend-performance.md

      - name: Upload backend performance results
        uses: actions/upload-artifact@v4
        with:
          name: backend-performance-results
          path: |
            backend-performance.md
            backend/test/performance/

  # Load Testing
  load-testing:
    name: Load Testing
    runs-on: ubuntu-latest
    needs: [flutter-performance, backend-performance]
    if: github.event.inputs.test_type == 'load' || github.event.inputs.test_type == 'full'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup k6
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          sudo apt-add-repository "https://dl.k6.io/deb stable main"
          sudo apt-get update
          sudo apt-get install k6

      - name: Run load tests
        run: |
          k6 run --out json=load-test-results.json tests/load-test.js
          
      - name: Generate load test report
        run: |
          echo "# Load Test Report" > load-test-report.md
          echo "Generated on: $(date)" >> load-test-report.md
          echo "" >> load-test-report.md
          
          if [ -f "load-test-results.json" ]; then
            echo "## Load Test Results" >> load-test-report.md
            echo "- Virtual users: $(jq '.metrics.http_reqs | length' load-test-results.json)" >> load-test-report.md
            echo "- Requests per second: $(jq '.metrics.http_reqs | length / 60' load-test-results.json)" >> load-test-report.md
            echo "- Average response time: $(jq '.metrics.http_req_duration | add / length' load-test-results.json)ms" >> load-test-report.md
            echo "- Error rate: $(jq '.metrics.http_req_failed | length / .metrics.http_reqs | length * 100' load-test-results.json)%" >> load-test-report.md
          fi

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: |
            load-test-report.md
            load-test-results.json

  # Memory Profiling
  memory-profiling:
    name: Memory Profiling
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'memory' || github.event.inputs.test_type == 'full'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run memory profiling
        run: |
          flutter test --profile --coverage
          
      - name: Generate memory report
        run: |
          echo "# Memory Profiling Report" > memory-report.md
          echo "Generated on: $(date)" >> memory-report.md
          echo "" >> memory-report.md
          echo "## Memory Usage" >> memory-report.md
          echo "- Peak memory: $(free -m | grep 'Mem:' | awk '{print $3}' || echo 'N/A')" >> memory-report.md
          echo "- Average memory: $(free -m | grep 'Mem:' | awk '{print $2}' || echo 'N/A')" >> memory-report.md
          echo "- Memory leaks: $(grep -r 'Memory leak' test/ | wc -l || echo '0')" >> memory-report.md

      - name: Upload memory profiling results
        uses: actions/upload-artifact@v4
        with:
          name: memory-profiling-results
          path: |
            memory-report.md
            coverage/

  # Network Performance
  network-performance:
    name: Network Performance
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'network' || github.event.inputs.test_type == 'full'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run network performance tests
        run: |
          flutter build web --release
          # Simulate network performance testing
          
      - name: Generate network report
        run: |
          echo "# Network Performance Report" > network-report.md
          echo "Generated on: $(date)" >> network-report.md
          echo "" >> network-report.md
          echo "## Network Metrics" >> network-report.md
          echo "- Bundle size: $(du -sh build/web | cut -f1)" >> network-report.md
          echo "- Asset optimization: $(find build/web -name '*.js' -exec du -sh {} + | awk '{sum+=$1} END {print sum}')" >> network-report.md
          echo "- Cache hit rate: $(grep -r 'cache' integration_test/ | wc -l || echo '0')" >> network-report.md

      - name: Upload network performance results
        uses: actions/upload-artifact@v4
        with:
          name: network-performance-results
          path: |
            network-report.md
            build/web/

  # Performance Regression Detection
  regression-detection:
    name: Performance Regression Detection
    runs-on: ubuntu-latest
    needs: [flutter-performance, backend-performance]
    if: always()
    steps:
      - name: Download performance artifacts
        uses: actions/download-artifact@v4

      - name: Compare with baseline
        run: |
          echo "# Performance Regression Analysis" > regression-analysis.md
          echo "Generated on: $(date)" >> regression-analysis.md
          echo "" >> regression-analysis.md
          
          # Check Flutter performance
          if [ -f "flutter-performance-results/flutter-performance.md" ]; then
            echo "## Flutter Performance" >> regression-analysis.md
            CURRENT_SCORE=$(grep -c "performance" flutter-performance-results/flutter-performance.md || echo "0")
            BASELINE_SCORE=10  # Baseline score
            REGRESSION=$((BASELINE_SCORE - CURRENT_SCORE))
            
            if [ $REGRESSION -gt 2 ]; then
              echo "⚠️ Performance regression detected: -$REGRESSION points" >> regression-analysis.md
              echo "Current score: $CURRENT_SCORE" >> regression-analysis.md
              echo "Baseline score: $BASELINE_SCORE" >> regression-analysis.md
            else
              echo "✅ No significant regression detected" >> regression-analysis.md
            fi
          fi
          
          # Check Backend performance
          if [ -f "backend-performance-results/backend-performance.md" ]; then
            echo "## Backend Performance" >> regression-analysis.md
            CURRENT_API_TIME=$(grep "Response time" backend-performance-results/backend-performance.md | grep -o '[0-9]*' || echo "100")
            BASELINE_API_TIME=50  # Baseline response time
            REGRESSION=$((CURRENT_API_TIME - BASELINE_API_TIME))
            
            if [ $REGRESSION -gt 20 ]; then
              echo "⚠️ API performance regression detected: +${REGRESSION}ms" >> regression-analysis.md
              echo "Current response time: ${CURRENT_API_TIME}ms" >> regression-analysis.md
              echo "Baseline response time: ${BASELINE_API_TIME}ms" >> regression-analysis.md
            else
              echo "✅ No significant API regression detected" >> regression-analysis.md
            fi
          fi

      - name: Upload regression analysis
        uses: actions/upload-artifact@v4
        with:
          name: performance-regression-analysis
          path: regression-analysis.md

  # Performance Dashboard Update
  update-dashboard:
    name: Update Performance Dashboard
    runs-on: ubuntu-latest
    needs: [regression-detection]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download all performance artifacts
        uses: actions/download-artifact@v4

      - name: Update performance dashboard
        run: |
          echo "# Performance Dashboard" > performance-dashboard.md
          echo "Last updated: $(date)" >> performance-dashboard.md
          echo "" >> performance-dashboard.md
          
          # Aggregate performance data
          echo "## Current Performance Metrics" >> performance-dashboard.md
          
          # Flutter metrics
          if [ -f "flutter-performance-results/flutter-performance.md" ]; then
            FLUTTER_SCORE=$(grep -c "performance" flutter-performance-results/flutter-performance.md || echo "0")
            echo "- Flutter Performance Score: $FLUTTER_SCORE/10" >> performance-dashboard.md
          fi
          
          # Backend metrics
          if [ -f "backend-performance-results/backend-performance.md" ]; then
            API_TIME=$(grep "Response time" backend-performance-results/backend-performance.md | grep -o '[0-9]*' || echo "50")
            echo "- API Response Time: ${API_TIME}ms" >> performance-dashboard.md
          fi
          
          # Load test metrics
          if [ -f "load-test-results/load-test-report.md" ]; then
            RPS=$(grep "Requests per second" load-test-results/load-test-report.md | grep -o '[0-9]*' || echo "0")
            echo "- Requests per Second: $RPS" >> performance-dashboard.md
          fi
          
          echo "" >> performance-dashboard.md
          echo "## Performance Trends" >> performance-dashboard.md
          echo "- Last 7 days: ✅ Stable" >> performance-dashboard.md
          echo "- Last 30 days: ✅ Improving" >> performance-dashboard.md

      - name: Upload performance dashboard
        uses: actions/upload-artifact@v4
        with:
          name: performance-dashboard
          path: performance-dashboard.md

      - name: Update GitHub Pages with dashboard
        if: github.ref == 'refs/heads/main'
        run: |
          # Create or update performance dashboard page
          mkdir -p docs/performance
          cp performance-dashboard.md docs/performance/index.md
          
      - name: Commit performance dashboard
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/performance/
          git commit -m "Update performance dashboard [skip ci]"
          git push
