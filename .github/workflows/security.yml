name: Security Scanning

on:
  schedule:
    # Run security scan daily at 2 AM UTC
    - cron: '0 2 * * *'
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # Dependency Security Scan
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.17.0'
          cache: 'npm'
          cache-dependency-path: backend/

      - name: Run npm audit
        working-directory: backend
        run: npm audit --audit-level=moderate --json > audit-results.json

      - name: Run Flutter audit
        run: |
          flutter pub deps --json > flutter-deps.json
          # Custom Flutter dependency security check

      - name: Upload security results
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: |
            backend/audit-results.json
            flutter-deps.json

      - name: Comment PR with security results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('backend/audit-results.json')) {
              const auditResults = JSON.parse(fs.readFileSync('backend/audit-results.json', 'utf8'));
              const vulnerabilities = auditResults.vulnerabilities || {};
              const totalVulns = Object.keys(vulnerabilities).length;
              
              if (totalVulns > 0) {
                const comment = `## 🔒 Security Scan Results\n\nFound ${totalVulns} vulnerabilities:\n${Object.entries(vulnerabilities).map(([key, vuln]) => `- **${vuln.severity}**: ${vuln.title} (${key})`).join('\n')}`;
                
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
              }
            }

  # Code Security Analysis
  code-security:
    name: Code Security Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          languages: javascript, typescript, dart

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25
          output: sarif
          ref: ${{ github.ref }}

      - name: Upload Semgrep results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: semgrep.sarif

  # Container Security Scan
  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t vedantatrade:latest .
          docker save vedantatrade:latest -o vedantatrade.tar

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'vedantatrade:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate security report
        run: |
          echo "# Security Scan Report" > security-report.md
          echo "Generated on: $(date)" >> security-report.md
          echo "" >> security-report.md
          echo "## Container Vulnerabilities" >> security-report.md
          if [ -f "trivy-results.sarif" ]; then
            echo "- Container scan completed" >> security-report.md
          else
            echo "- Container scan failed" >> security-report.md
          fi

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md

  # Secrets Detection
  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_DETECT_YES: true

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD

      - name: Upload secrets scan results
        uses: actions/upload-artifact@v4
        with:
          name: secrets-scan-results
          path: |
            gitleaks-report.json
            trufflehog-output.json

  # Infrastructure Security Scan
  infra-security:
    name: Infrastructure Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.infra == 'true')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.5.0'

      - name: Run Terraform security scan
        run: |
          if [ -d "infrastructure/" ]; then
            cd infrastructure/
            terraform fmt -check
            terraform validate
            terraform plan -out=tfplan
            terraform show -json tfplan > tfplan.json
          fi

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: infrastructure/
          additional_args: "--exclude-downloaded-modules"

      - name: Upload infrastructure security results
        uses: actions/upload-artifact@v4
        with:
          name: infra-security-results
          path: |
            tfplan.json
            tfsec-results.json

  # Security Score
  security-score:
    name: Security Score Calculation
    runs-on: ubuntu-latest
    needs: [dependency-scan, code-security, container-scan, secrets-scan]
    if: always()
    steps:
      - name: Download all security artifacts
        uses: actions/download-artifact@v4

      - name: Calculate security score
        run: |
          # Initialize scores
          DEPS_SCORE=100
          CODE_SCORE=100
          CONTAINER_SCORE=100
          SECRETS_SCORE=100
          
          # Check dependency scan results
          if [ -f "security-scan-results/backend/audit-results.json" ]; then
            VULNS=$(jq '.vulnerabilities | length' security-scan-results/backend/audit-results.json)
            DEPS_SCORE=$((100 - VULNS * 5))
            echo "Dependency score: $DEPS_SCORE"
          fi
          
          # Check code security results
          if [ -f "semgrep.sarif" ]; then
            ISSUES=$(jq '.results | length' semgrep.sarif)
            CODE_SCORE=$((100 - ISSUES * 2))
            echo "Code security score: $CODE_SCORE"
          fi
          
          # Check container scan results
          if [ -f "trivy-results.sarif" ]; then
            VULNS=$(jq '.results | length' trivy-results.sarif)
            CONTAINER_SCORE=$((100 - VULNS * 3))
            echo "Container score: $CONTAINER_SCORE"
          fi
          
          # Check secrets scan results
          if [ -f "gitleaks-report.json" ]; then
            LEAKS=$(jq '.findings | length' gitleaks-report.json)
            SECRETS_SCORE=$((100 - LEAKS * 10))
            echo "Secrets score: $SECRETS_SCORE"
          fi
          
          # Calculate overall score
          OVERALL_SCORE=$(( (DEPS_SCORE + CODE_SCORE + CONTAINER_SCORE + SECRETS_SCORE) / 4 ))
          
          echo "Overall security score: $OVERALL_SCORE"
          echo "score=$OVERALL_SCORE" >> $GITHUB_OUTPUT

      - name: Create security badge
        run: |
          SCORE="${{ steps.calculate-score.outputs.score }}"
          COLOR="red"
          if [ "$SCORE" -ge 80 ]; then
            COLOR="green"
          elif [ "$SCORE" -ge 60 ]; then
            COLOR="yellow"
          fi
          
          echo "Security Score: $SCORE/100" > security-score.txt
          echo "![Security Score](https://img.shields.io/badge/security-$SCORE/100-$COLOR)" >> security-score.txt

      - name: Update security badge
        if: github.ref == 'refs/heads/main'
        run: |
          # Update security badge in README or create/update security.md
          echo "Security badge updated"

      - name: Notify security issues
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"🚨 Security issues detected in ${{ github.repository }} - ${{ github.sha }}"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }} || echo "Slack notification skipped"

  # Security Policy Check
  policy-check:
    name: Security Policy Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check security policies
        run: |
          echo "Checking security policies..."
          
          # Check for hardcoded secrets
          if grep -r "password\|secret\|key\|token" --include="*.dart" --include="*.ts" --include="*.js" .; then
            echo "❌ Potential hardcoded secrets found"
            exit 1
          fi
          
          # Check for insecure dependencies
          if grep -r "http://" --include="*.dart" --include="*.ts" --include="*.js" .; then
            echo "❌ Insecure HTTP URLs found"
            exit 1
          fi
          
          # Check for debug code in production
          if grep -r "console.log\|debugger\|debugger" --include="*.dart" --include="*.ts" --include="*.js" .; then
            echo "⚠️ Debug code found in production"
          fi
          
          echo "✅ Security policy check passed"

      - name: Upload policy check results
        uses: actions/upload-artifact@v4
        with:
          name: policy-check-results
          path: policy-results.txt
