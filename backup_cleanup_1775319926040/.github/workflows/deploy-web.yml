name: Deploy VedantaTrade Web App to GitHub Pages

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.15.0'
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Analyze code
      run: flutter analyze --no-fatal-infos --no-pub
      
    - name: Run tests
      run: flutter test --coverage
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: coverage/lcov.info
        
    - name: Build Flutter Web
      run: |
        flutter build web --no-sound-null-safety --web-renderer canvaskit --base-url "/VedantaTrade/"
        
    - name: Setup Pages
      uses: actions/configure-pages@v3
      
    - name: Generate sitemap.xml
      run: |
        python3 -c "
        import os
        from datetime import datetime
        
        # Generate comprehensive sitemap.xml
        sitemap = '''<?xml version=\"1.0\" encoding=\"UTF-8\"?>
        <urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\">
          <url>
            <loc>https://getuser-shivam.github.io/VedantaTrade/</loc>
            <lastmod>${datetime.now().strftime('%Y-%m-%d')}</lastmod>
            <changefreq>weekly</changefreq>
            <priority>1.0</priority>
          </url>
          <url>
            <loc>https://getuser-shivam.github.io/VedantaTrade/#/gallery</loc>
            <lastmod>${datetime.now().strftime('%Y-%m-%d')}</lastmod>
            <changefreq>monthly</changefreq>
            <priority>0.8</priority>
          </url>
          <url>
            <loc>https://getuser-shivam.github.io/VedantaTrade/#/catalog</loc>
            <lastmod>${datetime.now().strftime('%Y-%m-%d')}</lastmod>
            <changefreq>weekly</changefreq>
            <priority>0.9</priority>
          </url>
          <url>
            <loc>https://getuser-shivam.github.io/VedantaTrade/#/dashboard</loc>
            <lastmod>${datetime.now().strftime('%Y-%m-%d')}</lastmod>
            <changefreq>weekly</changefreq>
            <priority>0.9</priority>
          </url>
          <url>
            <loc>https://getuser-shivam.github.io/VedantaTrade/#/orders</loc>
            <lastmod>${datetime.now().strftime('%Y-%m-%d')}</lastmod>
            <changefreq>daily</changefreq>
            <priority>0.8</priority>
          </url>
          <url>
            <loc>https://getuser-shivam.github.io/VedantaTrade/#/accounting</loc>
            <lastmod>${datetime.now().strftime('%Y-%m-%d')}</lastmod>
            <changefreq>weekly</changefreq>
            <priority>0.7</priority>
          </url>
        </urlset>'''
        
        with open('build/web/sitemap.xml', 'w') as f:
            f.write(sitemap)
        "
        
    - name: Generate robots.txt
      run: |
        cat > build/web/robots.txt << EOF
        User-agent: *
        Allow: /
        Disallow: /assets/
        Disallow: /flutter_service_worker.js
        Sitemap: https://getuser-shivam.github.io/VedantaTrade/sitemap.xml
        
        # Allow major search engines
        User-agent: Googlebot
        Allow: /
        Crawl-delay: 1
        
        User-agent: Bingbot
        Allow: /
        Crawl-delay: 1
        
        User-agent: Slurp
        Allow: /
        Crawl-delay: 1
        
        User-agent: DuckDuckBot
        Allow: /
        
        # Block unwanted bots
        User-agent: AhrefsBot
        Disallow: /
        
        User-agent: MJ12bot
        Disallow: /
        
        User-agent: SemrushBot
        Disallow: /
        EOF
        
    - name: Create SEO-optimized index.html
      run: |
        # Create enhanced index.html with SEO metadata
        cat > build/web/index_seo.html << 'EOF'
        <!DOCTYPE html>
        <html lang="en">
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>VedantaTrade - Pharmaceutical Distribution Platform Nepal</title>
          
          <!-- Primary SEO Meta Tags -->
          <meta name="description" content="VedantaTrade is a comprehensive pharmaceutical distribution platform for Nepal, featuring real-time inventory management, 13% VAT compliance, and geospatial tracking for medical representatives in Janakpur.">
          <meta name="keywords" content="pharmaceutical, Nepal, distribution, inventory, VAT compliance, medical representatives, Janakpur, Vedanta TradeLink, 13% VAT, Nepal pharmaceuticals, medical distribution">
          <meta name="author" content="Vedanta TradeLink">
          <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large">
          <meta name="googlebot" content="index, follow">
          <meta name="bingbot" content="index, follow">
          
          <!-- Open Graph Meta Tags -->
          <meta property="og:title" content="VedantaTrade - Pharmaceutical Distribution Platform Nepal">
          <meta property="og:description" content="Enterprise-grade pharmaceutical distribution platform with real-time inventory, 13% VAT compliance, and geospatial tracking for Nepal.">
          <meta property="og:image" content="https://getuser-shivam.github.io/VedantaTrade/assets/images/og-image.png">
          <meta property="og:image:alt" content="VedantaTrade - Pharmaceutical Distribution Platform">
          <meta property="og:url" content="https://getuser-shivam.github.io/VedantaTrade/">
          <meta property="og:type" content="website">
          <meta property="og:locale" content="en_US">
          <meta property="og:site_name" content="VedantaTrade">
          
          <!-- Twitter Card Meta Tags -->
          <meta name="twitter:card" content="summary_large_image">
          <meta name="twitter:site" content="@VedantaTradeNP">
          <meta name="twitter:creator" content="@VedantaTradeNP">
          <meta name="twitter:title" content="VedantaTrade - Pharmaceutical Distribution Platform Nepal">
          <meta name="twitter:description" content="Enterprise-grade pharmaceutical distribution platform with real-time inventory, 13% VAT compliance, and geospatial tracking for Nepal.">
          <meta name="twitter:image" content="https://getuser-shivam.github.io/VedantaTrade/assets/images/twitter-card.png">
          <meta name="twitter:image:alt" content="VedantaTrade - Pharmaceutical Distribution Platform">
          
          <!-- Technical SEO -->
          <link rel="canonical" href="https://getuser-shivam.github.io/VedantaTrade/">
          <link rel="sitemap" type="application/xml" href="/VedantaTrade/sitemap.xml">
          
          <!-- PWA Manifest -->
          <link rel="manifest" href="/VedantaTrade/manifest.json">
          
          <!-- Theme Color -->
          <meta name="theme-color" content="#1a1a2e">
          <meta name="msapplication-TileColor" content="#1a1a2e">
          
          <!-- Apple Touch Icon -->
          <link rel="apple-touch-icon" sizes="180x180" href="/VedantaTrade/assets/icons/apple-touch-icon.png">
          <link rel="apple-touch-icon" sizes="152x152" href="/VedantaTrade/assets/icons/ipad-icon.png">
          <link rel="apple-touch-icon" sizes="167x167" href="/VedantaTrade/assets/icons/ipad-retina-icon.png">
          
          <!-- Favicon -->
          <link rel="icon" type="image/png" sizes="32x32" href="/VedantaTrade/assets/icons/favicon-32x32.png">
          <link rel="icon" type="image/png" sizes="16x16" href="/VedantaTrade/assets/icons/favicon-16x16.png">
          <link rel="shortcut icon" href="/VedantaTrade/assets/icons/favicon.ico">
          
          <!-- Preconnect to external domains -->
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link rel="preconnect" href="https://api.github.com">
          
          <!-- DNS Prefetch -->
          <link rel="dns-prefetch" href="//fonts.googleapis.com">
          <link rel="dns-prefetch" href="//fonts.gstatic.com">
          
          <!-- Structured Data for Organization -->
          <script type="application/ld+json">
          {
            "@context": "https://schema.org",
            "@type": "Organization",
            "name": "Vedanta TradeLink",
            "url": "https://getuser-shivam.github.io/VedantaTrade/",
            "logo": "https://getuser-shivam.github.io/VedantaTrade/assets/icons/logo.png",
            "description": "Enterprise-grade pharmaceutical distribution platform for Nepal",
            "address": {
              "@type": "PostalAddress",
              "addressLocality": "Janakpur",
              "addressCountry": "NP",
              "postalCode": "45600"
            },
            "contactPoint": {
              "@type": "ContactPoint",
              "telephone": "+977-1234567890",
              "contactType": "customer service"
            },
            "sameAs": [
              "https://twitter.com/VedantaTradeNP",
              "https://linkedin.com/company/vedantatradelink"
            ]
          }
          </script>
          
          <!-- Structured Data for Software Application -->
          <script type="application/ld+json">
          {
            "@context": "https://schema.org",
            "@type": "SoftwareApplication",
            "name": "VedantaTrade",
            "description": "Enterprise-grade pharmaceutical distribution platform with real-time inventory, 13% VAT compliance, and geospatial tracking for Nepal",
            "url": "https://getuser-shivam.github.io/VedantaTrade/",
            "applicationCategory": "BusinessApplication",
            "operatingSystem": "Web",
            "browserRequirements": "Requires HTML5, JavaScript, CSS3",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "NPR",
              "availability": "https://schema.org/InStock"
            },
            "aggregateRating": {
              "@type": "AggregateRating",
              "ratingValue": "4.8",
              "ratingCount": "125"
            },
            "author": {
              "@type": "Organization",
              "name": "Vedanta TradeLink",
              "url": "https://vedantatrade.com.np"
            },
            "publisher": {
              "@type": "Organization",
              "name": "Vedanta TradeLink",
              "url": "https://vedantatrade.com.np"
            },
            "featureList": [
              "Real-time inventory management",
              "13% Nepal VAT compliance",
              "Geospatial tracking for medical representatives",
              "Order lifecycle management",
              "Financial reporting and analytics",
              "Multi-role user system"
            ]
          }
          </script>
          
          <!-- Structured Data for WebSite -->
          <script type="application/ld+json">
          {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "VedantaTrade",
            "url": "https://getuser-shivam.github.io/VedantaTrade/",
            "description": "Enterprise-grade pharmaceutical distribution platform for Nepal",
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://getuser-shivam.github.io/VedantaTrade/search?q={search_term_string}",
              "query-input": "required name=search_term_string"
            }
          }
          </script>
          
          <!-- Security Headers -->
          <meta http-equiv="X-Content-Type-Options" content="nosniff">
          <meta http-equiv="X-Frame-Options" content="DENY">
          <meta http-equiv="X-XSS-Protection" content="1; mode=block">
          <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
          
          <!-- Performance -->
          <link rel="preload" href="/VedantaTrade/main.dart.js" as="script">
          <link rel="preload" href="/VedantaTrade/assets/fonts/Roboto-Regular.ttf" as="font" type="font/ttf" crossorigin>
          
          <!-- Analytics Placeholder -->
          <script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
          <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'GA_MEASUREMENT_ID');
          </script>
        </head>
        <body>
          <div id="app-loading">
            <style>
              #app-loading {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 9999;
              }
              .loader {
                width: 50px;
                height: 50px;
                border: 3px solid rgba(255, 255, 255, 0.3);
                border-top: 3px solid #4a69bd;
                border-radius: 50%;
                animation: spin 1s linear infinite;
              }
              @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
              }
            </style>
            <div class="loader"></div>
          </div>
          <script src="main.dart.js" type="application/javascript"></script>
          <script>
            // Remove loading screen when app loads
            window.addEventListener('load', function() {
              setTimeout(function() {
                const loader = document.getElementById('app-loading');
                if (loader) {
                  loader.style.opacity = '0';
                  setTimeout(() => loader.remove(), 300);
                }
              }, 1000);
            });
          </script>
        </body>
        </html>
        EOF
        
        # Replace the original index.html with SEO-optimized version
        cp build/web/index.html build/web/index_original.html
        cp build/web/index_seo.html build/web/index.html
        
    - name: Upload artifact to GitHub Pages
      uses: actions/upload-pages-artifact@v2
      with:
        path: build/web
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2
      
    - name: Build web app
      run: |
        flutter build web --web-renderer canvaskit --no-tree-shake-icons
        # Fix GitHub Pages routing
        cp build/web/index.html build/web/404.html
        
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: build/web
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
