name: Code Quality and Security

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run code quality checks daily at 4 AM UTC
    - cron: '0 4 * * *'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.2'
  NODE_VERSION: '18.17.0'

jobs:
  # Code Analysis
  code-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Run Flutter analyze
      run: |
        flutter analyze --no-fatal-infos --preamble > flutter-analysis.txt
        cat flutter-analysis.txt
        
    - name: Check code formatting
      run: |
        dart format --output=none --set-exit-if-changed lib test
        if [ $? -eq 0 ]; then
          echo "✅ Code is properly formatted"
        else
          echo "❌ Code formatting issues found"
          exit 1
        fi
        
    - name: Run custom quality checks
      run: |
        echo "Running custom quality checks..."
        
        # Check for print statements
        if grep -r "print(" lib/ --exclude-dir=generated; then
          echo "❌ Found print statements in production code"
          exit 1
        fi
        
        # Check for TODO comments without issue numbers
        if grep -r "TODO" lib/ | grep -v "TODO(#"; then
          echo "❌ Found TODO comments without issue numbers"
          exit 1
        fi
        
        # Check for hardcoded secrets
        if grep -r -E "(password|secret|key|token)" lib/ | grep -v "//.*secret\|//.*password"; then
          echo "❌ Found potential hardcoded secrets"
          exit 1
        fi
        
        # Check for TODO comments in production code
        TODO_COUNT=$(grep -r "TODO\|FIXME\|HACK" --include="*.dart" lib/ | wc -l || echo "0")
        if [ "$TODO_COUNT" -gt 0 ]; then
          echo "⚠️ Found $TODO_COUNT TODO/FIXME comments in production code"
        fi
        
        # Check for hard-coded strings
        HARDCODED_STRINGS=$(grep -r "'[A-Z][a-zA-Z]*'" --include="*.dart" lib/ | wc -l || echo "0")
        if [ "$HARDCODED_STRINGS" -gt 10 ]; then
          echo "⚠️ Found $HARDCODED_STRINGS potentially hard-coded strings"
        fi
        
        # Check for long functions
        LONG_FUNCTIONS=$(grep -r "Future<.*>.*(" --include="*.dart" lib/ | wc -l || echo "0")
        if [ "$LONG_FUNCTIONS" -gt 20 ]; then
          echo "⚠️ Found $LONG_FUNCTIONS potentially complex functions"
        fi

    - name: Calculate code metrics
      run: |
        echo "# Flutter Code Metrics" > flutter-metrics.md
        echo "Generated on: $(date)" >> flutter-metrics.md
        echo "" >> flutter-metrics.md
        echo "## Code Statistics" >> flutter-metrics.md
        echo "- Total Dart files: $(find lib/ -name "*.dart" | wc -l)" >> flutter-metrics.md
        echo "- Total lines of code: $(find lib/ -name "*.dart" -exec wc -l {} + | tail -1)" >> flutter-metrics.md
        echo "- Total test files: $(find test/ -name "*.dart" | wc -l)" >> flutter-metrics.md
        echo "- Test lines: $(find test/ -name "*.dart" -exec wc -l {} + | tail -1)" >> flutter-metrics.md
        echo "" >> flutter-metrics.md
        echo "## Quality Indicators" >> flutter-metrics.md
        echo "- TODO comments: $TODO_COUNT" >> flutter-metrics.md
        echo "- Hard-coded strings: $HARDCODED_STRINGS" >> flutter-metrics.md
        echo "- Complex functions: $LONG_FUNCTIONS" >> flutter-metrics.md

    - name: Upload Flutter quality results
      uses: actions/upload-artifact@v4
      with:
        name: flutter-quality-results
        path: |
          flutter-analysis.txt
          flutter-metrics.md

  # Dependency Security Scan
  dependency-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Run dependency audit
      run: |
        # Check for known vulnerable packages
        flutter pub deps --style=tree > deps.txt
        
        # Run audit (if audit package is available)
        if command -v dart &> /dev/null; then
          dart pub audit
        fi
        
    - name: Check for outdated dependencies
      run: flutter pub outdated

  # Code Coverage
  coverage:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Generate coverage
      run: |
        flutter test --coverage
        genhtml coverage/lcov.info -o coverage/html
        
    - name: Check coverage threshold
      run: |
        COVERAGE=$(lcov --summary coverage/lcov.info | grep -o '[0-9]*\.[0-9]*%' | head -1 | sed 's/%//')
        echo "Current coverage: $COVERAGE"
        
        if (( $(echo "$COVERAGE < 80" | bc -l) )); then
          echo "❌ Coverage below 80% threshold"
          exit 1
        else
          echo "✅ Coverage meets 80% threshold"
        fi
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  # Security Vulnerability Scan
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
        
    - name: Run CodeQL Analysis
      uses: github/codeql-action/analyze@v2
      with:
        languages: dart

  # Performance Analysis
  performance-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Build for performance analysis
      run: flutter build web --web-renderer canvaskit --no-tree-shake-icons
        
    - name: Analyze bundle size
      run: |
        du -sh build/web/
        find build/web/ -name "*.js" -exec ls -lh {} \;
        
    - name: Check for performance issues
      run: |
        # Check for large assets
        find assets/ -type f -size +1M -exec echo "Large asset found: {}" \;
        
        # Check for unused imports
        dart analyze --fatal-infos | grep "unused_import" && echo "❌ Unused imports found"

  # Documentation Check
  documentation-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Check documentation
      run: |
        # Check for README.md
        if [ ! -f README.md ]; then
          echo "❌ README.md not found"
          exit 1
        fi
        
        # Check for CHANGELOG.md
        if [ ! -f CHANGELOG.md ]; then
          echo "❌ CHANGELOG.md not found"
          exit 1
        fi
        
        # Check for pubspec.yaml documentation
        if ! grep -q "description:" pubspec.yaml; then
          echo "❌ Package description missing in pubspec.yaml"
          exit 1
        fi
        
        # Check for API documentation
        if ! find lib/ -name "*.dart" -exec grep -l "///" {} \; | head -1 | grep -q "."; then
          echo "❌ No API documentation found"
          exit 1
        fi

  # Quality Gate
  quality-gate:
    needs: [code-analysis, dependency-scan, coverage, security-scan, performance-analysis, documentation-check]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Quality Gate Summary
      run: |
        echo "# Quality Gate Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Code Analysis | ${{ needs.code-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Dependency Scan | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Coverage | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Performance Analysis | ${{ needs.performance-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Documentation Check | ${{ needs.documentation-check.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Overall status
        if [[ "${{ needs.code-analysis.result }}" == "success" && "${{ needs.dependency-scan.result }}" == "success" && "${{ needs.coverage.result }}" == "success" && "${{ needs.security-scan.result }}" == "success" && "${{ needs.performance-analysis.result }}" == "success" && "${{ needs.documentation-check.result }}" == "success" ]]; then
          echo "✅ All quality checks passed!" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Some quality checks failed!" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
